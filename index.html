<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>L’Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg-card: rgba(255,250,243,0.98); /* carte plus opaque */
      --accent: #b8833a;
      --accent-soft: #eadcc8;
      --text-main: #2e241b;
      --text-soft: #5a4335;
      --border-soft: rgba(170, 140, 90, 0.55);
      --shadow-soft: 0 14px 34px rgba(0,0,0,0.28);
      --radius-xl: 26px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Helvetica Neue", Arial, sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* 🌲 FOND FORÊT un peu flouté, un peu assombri */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("foret-atelier.jpg") center center / cover no-repeat fixed;
      filter: blur(3px) brightness(0.7); /* plus flou + plus sombre */
      transform: scale(1.03);
      z-index: -2;
    }

    /* voile léger mais plus présent pour bien faire ressortir le texte */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(246, 236, 220, 0.6);
      z-index: -1;
    }

    /* HEADER */
    header {
      max-width: 980px;
      width: 100%;
      margin: 16px auto 0;
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      backdrop-filter: blur(8px);
      background: rgba(255, 248, 236, 0.9);
      border-radius: 999px;
      border: 1px solid rgba(200, 176, 130, 0.7);
      box-shadow: 0 8px 18px rgba(0,0,0,0.2);
    }

    .logo-zone { display: flex; flex-direction: column; }
    .logo-title {
      font-size: 1rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .logo-sub {
      font-size: 0.82rem;
      color: var(--text-soft);
    }

    nav { display: flex; gap: 10px; font-size: 0.86rem; }
    nav a {
      text-decoration: none;
      color: var(--text-main);
      padding: 7px 12px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--accent-soft);
      font-weight: 500;
      white-space: nowrap;
    }
    nav a:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .nav-artisan {
      background: #f5e3cc;
      border-color: rgba(170, 140, 90, 0.8);
      font-size: 0.8rem;
    }
    .nav-artisan:hover {
      background: var(--accent);
      color: #fff;
    }

    /* SWITCH LANGUE */
    .lang-switch {
      display: flex;
      gap: 6px;
      font-size: 0.8rem;
    }
    .lang-switch button {
      border-radius: 999px;
      padding: 6px 11px;
      border: 1px solid var(--accent-soft);
      background: #fff;
      color: var(--text-soft);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .lang-switch button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 18px 12px 32px;
    }

    .page {
      max-width: 980px;
      width: 100%;
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border-soft);
      padding: 24px 20px 26px;
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 24px;
      backdrop-filter: blur(10px); /* renforc*
