<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Read a whisper – L’Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f9f7f1;
      background: #050607 url("assets/foret-atelier.jpg") center/cover fixed no-repeat;
    }
    .overlay {
      min-height: 100vh;
      background: radial-gradient(circle at top, rgba(255, 240, 200, 0.25), transparent 55%);
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      backdrop-filter: blur(10px);
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.6), transparent);
    }
    .logo {
      font-family: "Georgia", "Times New Roman", serif;
      font-size: 1.1rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }
    .lang-switch button {
      background: transparent;
      border: 1px solid rgba(255, 240, 210, 0.5);
      color: #f9f4e5;
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .lang-switch button.active {
      background: rgba(255, 240, 210, 0.15);
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      max-width: 600px;
      width: 100%;
      border-radius: 1.5rem;
      padding: 2rem 1.75rem;
      backdrop-filter: blur(16px);
      background: linear-gradient(
        135deg,
        rgba(6, 6, 8, 0.95),
        rgba(40, 25, 14, 0.92)
      );
      border: 1px solid rgba(246, 224, 188, 0.35);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.75);
    }
    .card h1 {
      margin-top: 0;
      font-family: "Georgia", "Times New Roman", serif;
      font-size: 1.4rem;
    }
    label {
      display: block;
      margin-top: 1rem;
      font-size: 0.9rem;
      opacity: 0.9;
    }
    input[type="text"] {
      margin-top: 0.4rem;
      width: 100%;
      border-radius: 999px;
      border: 1px solid rgba(246, 224, 188, 0.35);
      background: rgba(10, 8, 6, 0.9);
      padding: 0.6rem 0.9rem;
      color: #f9f7f1;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #f1d19c;
    }
    .btn-primary {
      margin-top: 1.4rem;
      border-radius: 999px;
      padding: 0.7rem 1.15rem;
      border: none;
      background: linear-gradient(120deg, #f1d19c, #f5e3c4);
      color: #3a2a15;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .hint {
      margin-top: 0.45rem;
      font-size: 0.8rem;
      opacity: 0.8;
    }
    .result {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px dashed rgba(246, 224, 188, 0.4);
      font-size: 0.95rem;
      min-height: 3rem;
      white-space: pre-wrap;
    }
    .status {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      opacity: 0.8;
    }
    .audio-controls {
      margin-top: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .play-button {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: radial-gradient(circle at 30% 30%, #ffffff, #f1d19c);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #3a2a15;
      font-size: 1.1rem;
    }
  </style>
  <script>
    function switchLanguage(lang) {
      if (lang === "fr") {
        localStorage.setItem("preferred_lang", "fr");
        window.location.href = "client.html";
      } else {
        localStorage.setItem("preferred_lang", "en");
        window.location.href = "client-en.html";
      }
    }
  </script>
</head>
<body>
  <div class="overlay">
    <header>
      <div class="logo">L’Atelier des Liens Invisibles</div>
      <div class="lang-switch">
        <button onclick="switchLanguage('fr')">FR</button>
        <button class="active" onclick="switchLanguage('en')">EN</button>
      </div>
    </header>

    <main>
      <div class="card">
        <h1>Read a whisper from your jewel</h1>
        <p class="hint">
          If you scanned your jewel with NFC, the code may already be in the URL.
          Otherwise, enter the code given with your jewel.
        </p>

        <label for="bijou-id">Jewel code / public ID</label>
        <input id="bijou-id" type="text" placeholder="Example: BIJOU001 or public ID" />

        <button class="btn-primary" id="read-button">Read the whisper</button>

        <div class="status" id="status"></div>
        <div class="result" id="result"></div>

        <div class="audio-controls" id="audio-container" style="display:none;">
          <button class="play-button" id="play-audio" title="Play audio whisper">▶</button>
          <span style="font-size:0.85rem;opacity:0.85;">Audio whisper</span>
          <audio id="audio" style="display:none;"></audio>
        </div>
      </div>
    </main>
  </div>

  <script>
    // 🧠 Même logique que client.html (à adapter à ton backend actuel)
    const params = new URLSearchParams(window.location.search);
    const initialId = params.get("id") || params.get("public_id");
    const idInput = document.getElementById("bijou-id");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const audioEl = document.getElementById("audio");
    const audioContainer = document.getElementById("audio-container");
    const playBtn = document.getElementById("play-audio");

    if (initialId) {
      idInput.value = initialId;
      fetchMurmur();
    }

    document.getElementById("read-button").addEventListener("click", fetchMurmur);
    playBtn.addEventListener("click", () => {
      if (audioEl.paused) {
        audioEl.play();
        playBtn.textContent = "⏸";
      } else {
        audioEl.pause();
        playBtn.textContent = "▶";
      }
    });

    async function fetchMurmur() {
      const id = idInput.value.trim();
      if (!id) {
        statusEl.textContent = "Please enter a jewel code first.";
        return;
      }

      statusEl.textContent = "Calling the forest spirits...";
      resultEl.textContent = "";
      audioContainer.style.display = "none";

      try {
        const response = await fetch("/api/message", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id }) // adapte si tu utilises public_id côté backend
        });

        if (!response.ok) {
          throw new Error("Server error");
        }

        const data = await response.json();
        if (!data || !data.text) {
          statusEl.textContent = "No whisper available for this jewel.";
          return;
        }

        statusEl.textContent = "";
        resultEl.textContent = data.text;

        if (data.audio) {
          audioEl.src = "data:audio/mp3;base64," + data.audio;
          audioContainer.style.display = "flex";
          playBtn.textContent = "▶";
        } else {
          audioContainer.style.display = "none";
        }
      } catch (e) {
        console.error(e);
        statusEl.textContent = "Unable to read the whisper. Please try again later.";
      }
    }
  </script>
</body>
</html>
