<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>I already have a jewel – L’Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg-card: rgba(255,250,243,0.98);
      --accent: #b8833a;
      --accent-dark: #8a5f25;
      --accent-soft: #eadcc8;
      --text-main: #2e241b;
      --text-soft: #5a4335;
      --border-soft: rgba(170, 140, 90, 0.55);
      --shadow-soft: 0 14px 34px rgba(0,0,0,0.26);
      --radius-xl: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Helvetica Neue", Arial, sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 12px;
      position: relative;
      overflow: hidden;
    }

    /* 🌲 Forest background, same as other pages */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("foret-atelier.jpg") center center / cover no-repeat fixed;
      filter: blur(3px) brightness(0.7);
      transform: scale(1.03);
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(246, 236, 220, 0.6);
      z-index: -1;
    }

    /* Main card */
    .card {
      max-width: 520px;
      width: 100%;
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border-soft);
      padding: 22px 20px 26px;
      backdrop-filter: blur(10px);
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      text-align: center;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.83rem;
      color: var(--text-soft);
      text-align: center;
      margin-bottom: 18px;
    }

    .intro {
      font-size: 0.84rem;
      color: var(--text-soft);
      margin-bottom: 12px;
      text-align: center;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 0.82rem;
      color: var(--text-soft);
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--accent-soft);
      background: rgba(255,255,255,0.9);
      margin-top: 6px;
      font-size: 0.9rem;
      color: var(--text-main);
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(184,131,58,0.25);
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 11px 18px;
      border-radius: 18px;
      border: 1px solid var(--accent-dark);
      background: var(--accent);
      color: white;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 10px 22px rgba(0,0,0,0.25);
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    button:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
      transform: none;
    }

    .result {
      margin-top: 16px;
      font-size: 0.88rem;
      color: var(--text-soft);
    }

    .status {
      font-size: 0.82rem;
      margin-top: 6px;
      color: #a08967;
    }

    .status.error {
      color: #b03a3a;
    }

    .bloc {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 16px;
      background: #fffdf8;
      border: 1px solid #e4d5c3;
      font-size: 0.88rem;
    }

    .bloc-title {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.11em;
      color: #856549;
      margin-bottom: 4px;
    }

    .actions {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    @media (min-width: 480px) {
      .actions {
        flex-direction: row;
      }
      .actions a {
        flex: 1;
      }
    }

    a.btn {
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 0.88rem;
      text-decoration: none;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-weight: 500;
      border: 1px solid transparent;
    }

    .btn-main {
      background: #d39633;
      color: #fff;
      box-shadow: 0 8px 18px rgba(0,0,0,0.25);
      border-color: #a86b1e;
    }
    .btn-main:hover {
      background: #b67622;
    }

    .btn-ghost {
      background: #fff;
      color: var(--accent);
      border-color: var(--accent-soft);
    }
    .btn-ghost:hover {
      background: var(--accent-soft);
      color: #4a321e;
    }

    .small-note {
      margin-top: 10px;
      font-size: 0.78rem;
      color: #8a735a;
    }
  </style>
</head>

<body>
  <div class="card">

    <div class="logo">L’ATELIER DES LIENS INVISIBLES</div>
    <div class="subtitle">Access the whisper of your jewel.</div>

    <p class="intro">
      Enter the <strong>code of your jewel</strong> (code on the card, or internal ID),
      and we will guide you towards its whisper or a recharge.
    </p>

    <label for="codeBijou">Jewel code</label>
    <input
      type="text"
      id="codeBijou"
      placeholder="e.g. 95QN27 or BIJOU001"
    />

    <button id="searchBtn">
      🔍 Find my jewel
    </button>

    <div class="status" id="status">Waiting for your code…</div>

    <div class="result" id="result"></div>

    <div class="small-note">
      If you encounter difficulties, you can always contact the Atelier directly.
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://mchqysvhgnlixyjeserv.supabase.co";
    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jaHF5c3ZoZ25saXh5amVzZXJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM4NDE2OTYsImV4cCI6MjA3OTQxNzY5Nn0.vNE1iDPQeMls7RTqfFNS8Yxdlx_J2Jb9MgK4wcBtjWE";

    // 🔧 Adapt this email if needed
    const RECHARGE_EMAIL = "contact@atelier-liens-invisibles.fr";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const codeInput = document.getElementById("codeBijou");
    const searchBtn = document.getElementById("searchBtn");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");

    async function findBijouByCode(code) {
      // 1) Try by public_id
      let { data: bijou, error } = await supabase
        .from("bijoux")
        .select(`
          id,
          public_id,
          etat,
          langue,
          prenom,
          theme,
          sous_theme,
          messages_restants,
          messages_max,
          locked
        `)
        .eq("public_id", code)
        .maybeSingle();

      if (error) throw error;
      if (bijou) return bijou;

      // 2) Otherwise try by internal id
      const res2 = await supabase
        .from("bijoux")
        .select(`
          id,
          public_id,
          etat,
          langue,
          prenom,
          theme,
          sous_theme,
          messages_restants,
          messages_max,
          locked
        `)
        .eq("id", code)
        .maybeSingle();

      if (res2.error) throw res2.error;
      return res2.data || null;
    }

    function renderBijou(bijou) {
      // This is the EN page → we keep interface in English on purpose
      const restants = bijou.messages_restants;
      const max = bijou.messages_max;
      const locked = bijou.locked === true;
      const hasNoMessages = (restants != null && restants <= 0) || locked;

      const nom = bijou.prenom || "the person linked to this jewel";
      const themeText = bijou.theme || "not defined";
      const sousThemeText = bijou.sous_theme || "not specified";

      const urlMurmure = `/bijou-en.html?id=${encodeURIComponent(bijou.id)}`;
      const urlPerso = `/personnalisation-en.html?id=${encodeURIComponent(bijou.id)}`;

      const mailSubject = encodeURIComponent(
        "Recharge jewel " + (bijou.public_id || bijou.id)
      );
      const mailBody = encodeURIComponent(
        `Hello,\n\nI would like to recharge the jewel ${bijou.public_id || bijou.id}.\n\nThank you.`
      );
      const mailtoUrl = `mailto:${RECHARGE_EMAIL}?subject=${mailSubject}&body=${mailBody}`;

      let counterText = "";
      if (restants == null || max == null) {
        counterText = "Number of whispers remaining: information unavailable.";
      } else if (hasNoMessages) {
        counterText = `This jewel has used all its whispers (${restants}/${max}).`;
      } else {
        counterText = `There are ${restants} whisper(s) left out of ${max}.`;
      }

      let actionsHtml = "";

      if (hasNoMessages) {
        // Recharge mode
        actionsHtml = `
          <div class="actions">
            <a href="${mailtoUrl}" class="btn btn-main">
              🔁 Request a recharge
            </a>
            <a href="/index-en.html" class="btn btn-ghost">
              Back to the Atelier
            </a>
          </div>
        `;
      } else {
        // Normal mode: listen + adjust
        actionsHtml = `
          <div class="actions">
            <a href="${urlMurmure}" class="btn btn-main">
              🎧 Listen to the whisper
            </a>
            <a href="${urlPerso}" class="btn btn-ghost">
              Adjust personalization
            </a>
          </div>
        `;
      }

      resultEl.innerHTML = `
        <div class="bloc">
          <div class="bloc-title">Jewel found</div>
          <p>
            <strong>Internal ID:</strong> ${bijou.id}<br/>
            <strong>Public code:</strong> ${bijou.public_id || "—"}<br/>
            <strong>For:</strong> ${nom}<br/>
            <strong>Theme:</strong> ${themeText}<br/>
            <strong>Sub-theme:</strong> ${sousThemeText}
          </p>
          <p>${counterText}</p>
        </div>
        ${actionsHtml}
      `;

      if (hasNoMessages) {
        statusEl.textContent =
          "This jewel has completed its cycle of whispers. You can request a recharge.";
      } else {
        statusEl.textContent =
          "Your jewel is active. You can listen to a whisper or adjust the personalization.";
      }
      statusEl.classList.remove("error");
    }

    searchBtn.addEventListener("click", async () => {
      const code = codeInput.value.trim();

      if (!code) {
        statusEl.textContent = "Please enter a jewel code.";
        statusEl.classList.add("error");
        resultEl.innerHTML = "";
        return;
      }

      statusEl.textContent = "Searching for the jewel…";
      statusEl.classList.remove("error");
      searchBtn.disabled = true;
      resultEl.innerHTML = "";

      try {
        const bijou = await findBijouByCode(code);

        if (!bijou) {
          statusEl.textContent =
            "No jewel matches this code. Please check the spelling or contact the Atelier.";
          statusEl.classList.add("error");
          resultEl.innerHTML = "";
          return;
        }

        renderBijou(bijou);
      } catch (e) {
        console.error(e);
        statusEl.textContent =
          "Error while connecting to the Atelier. Please try again later.";
        statusEl.classList.add("error");
        resultEl.innerHTML = "";
      } finally {
        searchBtn.disabled = false;
      }
    });

    // Allow pressing Enter in the input
    codeInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        searchBtn.click();
      }
    });
  </script>
</body>
</html>
