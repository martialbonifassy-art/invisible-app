<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Customize the jewel – Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg-card: rgba(255,250,243,0.98);
      --accent: #b8833a;
      --accent-dark: #8a5f25;
      --accent-soft: #eadcc8;
      --text-main: #2e241b;
      --text-soft: #5a4335;
      --border-soft: rgba(170, 140, 90, 0.55);
      --shadow-soft: 0 14px 34px rgba(0,0,0,0.26);
      --radius-xl: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Helvetica Neue", Arial, sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 12px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("foret-atelier.jpg") center center / cover no-repeat fixed;
      filter: blur(3px) brightness(0.7);
      transform: scale(1.03);
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(246, 236, 220, 0.6);
      z-index: -1;
    }

    .card {
      max-width: 520px;
      width: 100%;
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border-soft);
      padding: 22px 20px 26px;
      backdrop-filter: blur(10px);
      animation: fadeIn 0.5s ease;
      position: relative;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.83rem;
      color: var(--text-soft);
      margin-bottom: 18px;
    }

    .lang-switch {
      position: absolute;
      top: 16px;
      right: 18px;
      display: inline-flex;
      background: #f7ecdd;
      border-radius: 999px;
      padding: 3px;
      border: 1px solid rgba(170, 140, 90, 0.45);
      gap: 3px;
    }

    .lang-btn {
      border-radius: 999px;
      border: none;
      padding: 4px 10px;
      font-size: 0.78rem;
      cursor: pointer;
      background: transparent;
      color: var(--text-soft);
    }

    .lang-btn.active {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .id-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid var(--accent-soft);
      background: rgba(250, 240, 225, 0.95);
      font-size: 0.8rem;
      color: var(--text-soft);
      margin: 0 auto 18px;
      display: block;
      width: fit-content;
    }

    label {
      display: block;
      margin-top: 14px;
      font-size: 0.87rem;
      color: var(--text-soft);
      font-weight: 600;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--accent-soft);
      background: rgba(255,255,255,0.9);
      margin-top: 6px;
      font-size: 0.88rem;
      color: var(--text-main);
      outline: none;
    }

    textarea {
      resize: none;
      height: 70px;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(184,131,58,0.25);
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px 18px;
      border-radius: 18px;
      border: 1px solid var(--accent-dark);
      background: var(--accent);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 10px 22px rgba(0,0,0,0.25);
      transition: 0.2s;
    }

    button:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
    }

    #result {
      margin-top: 14px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-soft);
    }
  </style>
</head>

<body>
  <div class="card">

    <div class="lang-switch">
      <button class="lang-btn" type="button" id="btnToFr">FR</button>
      <button class="lang-btn active" type="button">EN</button>
    </div>

    <div class="logo">L’ATELIER DES LIENS INVISIBLES</div>
    <div class="subtitle">Customize the voice linked to your jewel.</div>

    <div class="id-badge" id="idBadge">ID: UNKNOWN</div>

    <label for="prenom">First name:</label>
    <input type="text" id="prenom" placeholder="e.g. Marie">

    <label for="souvenir">Memory / place / personal detail:</label>
    <textarea id="souvenir" placeholder="e.g. Spring in Toulouse..."></textarea>

    <label for="voix">Voice choice:</label>
    <select id="voix">
      <option value="femme">Feminine voice</option>
      <option value="homme">Masculine voice</option>
    </select>

    <button id="saveBtn">Save settings</button>

    <div id="result"></div>

  </div>

  <script>
    function getIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id") || params.get("public_id") || "UNKNOWN";
    }

    const id = getIdFromUrl();
    document.getElementById("idBadge").textContent = "ID: " + id;

    // Switch vers FR en conservant l'id
    document.getElementById("btnToFr").addEventListener("click", () => {
      const url = new URL(window.location.origin + "/client.html");
      if (id && id !== "UNKNOWN") {
        url.searchParams.set("id", id);
      }
      window.location.href = url.toString();
    });

    document.getElementById("saveBtn").addEventListener("click", async () => {
      const result = document.getElementById("result");

      const data = {
        id: id,
        prenom: document.getElementById("prenom").value.trim(),
        souvenir: document.getElementById("souvenir").value.trim(),
        voix: document.getElementById("voix").value
      };

      result.textContent = "Saving…";

      try {
        const r = await fetch("/api/save", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        const res = await r.json();

        if (!r.ok || res.error) {
          result.textContent = "❌ Error: " + (res.error || "Unable to save");
          return;
        }

        result.textContent = "✔️ Settings saved successfully!";

      } catch (e) {
        console.error(e);
        result.textContent = "❌ Connection error.";
      }
    });
  </script>
</body>
</html>
