<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Artisan – Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, sans-serif;
      background: #f7efe2;
      color: #3b2f24;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    h1 {
      text-transform: uppercase;
      font-size: 1.1rem;
      margin: 0;
      letter-spacing: 0.15em;
      color: #b8833a;
    }
    .user-info {
      font-size: 0.85rem;
      color: #6b4f3f;
    }
    .logout-btn {
      padding: 6px 10px;
      border-radius: 999px;
      border: none;
      background: #b83a3a;
      color: #fff;
      cursor: pointer;
      font-size: 0.8rem;
      margin-left: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fffaf3;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #e0d4c3;
      text-align: left;
    }
    th {
      background: #eadcc8;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.8rem;
    }
    .btn {
      padding: 6px 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      color: #fff;
    }
    .btn-recharge {
      background: #82a738;
    }
    .btn-modif {
      background: #b8833a;
    }
    .btn-suppr {
      background: #b83a3a;
    }
    .zone-msg {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #6b4f3f;
    }
  </style>
</head>
<body>

<header>
  <h1>DASHBOARD ARTISAN</h1>
  <div class="user-info" id="userInfo">
    Connexion en cours…
  </div>
</header>

<table id="tableBijoux">
  <thead>
    <tr>
      <th>ID</th>
      <th>Prénom</th>
      <th>Restants</th>
      <th>Max</th>
      <th>Voix</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div class="zone-msg" id="msg"></div>

<script>
  const SUPABASE_URL = "https://mchqysvhgnlixyjeserv.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jaHF5c3ZoZ25saXh5amVzZXJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM4NDE2OTYsImV4cCI6MjA3OTQxNzY5Nn0.vNE1iDPQeMls7RTqfFNS8Yxdlx_J2Jb9MgK4wcBtjWE";

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const msg = document.getElementById("msg");
  const userInfo = document.getElementById("userInfo");

  async function requireAuth() {
    const { data } = await supabase.auth.getSession();
    const session = data.session;

    if (!session) {
      // Pas connecté → on redirige vers login
      window.location.href = "/login.html";
      return;
    }

    const email = session.user.email;
    userInfo.innerHTML = `
      Connecté en tant que ${email}
      <button class="logout-btn" onclick="logout()">Se déconnecter</button>
    `;

    chargerBijoux();
  }

  async function logout() {
    await supabase.auth.signOut();
    window.location.href = "/login.html";
  }

  async function chargerBijoux() {
    msg.textContent = "Chargement des données…";

    const r = await fetch("/api/listBijoux");
    const data = await r.json();

    const tbody = document.querySelector("#tableBijoux tbody");
    tbody.innerHTML = "";

    data.forEach((b) => {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${b.id}</td>
        <td>${b.prenom || "-"}</td>
        <td>${b.messages_restants}</td>
        <td>${b.messages_max}</td>
        <td>${b.voix || "-"}</td>
        <td>
          <button class="btn btn-recharge" onclick="recharger('${b.id}')">Recharger</button>
          <button class="btn btn-modif" onclick="modifier('${b.id}')">Modifier</button>
          <button class="btn btn-suppr" onclick="supprimerBijou('${b.id}')">Supprimer</button>
        </td>
      `;

      tbody.appendChild(tr);
    });

    msg.textContent = "Données chargées.";
  }

  async function recharger(id) {
    await fetch(`/api/rechargeBijou?id=${encodeURIComponent(id)}`);
    msg.textContent = `Bijou ${id} rechargé.`;
    chargerBijoux();
  }

  async function supprimerBijou(id) {
    if (!confirm(`Supprimer le bijou ${id} ?`)) return;
    await fetch(`/api/deleteBijou?id=${encodeURIComponent(id)}`);
    msg.textContent = `Bijou ${id} supprimé.`;
    chargerBijoux();
  }

  function modifier(id) {
    window.location.href = `/personnalisation.html?id=${encodeURIComponent(id)}`;
  }

  // Démarrage : vérifie qu'on est connecté
  requireAuth();
</script>

</body>
</html>
