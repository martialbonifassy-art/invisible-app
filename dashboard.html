<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard Artisan – L’Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-card: rgba(255,250,243,0.98);
      --accent: #b8833a;
      --accent-dark: #8a5f25;
      --accent-soft: #eadcc8;
      --text-main: #2e241b;
      --text-soft: #5a4335;
      --border-soft: rgba(170, 140, 90, 0.55);
      --shadow-soft: 0 16px 40px rgba(0,0,0,0.32);
      --radius-xl: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Helvetica Neue", Arial, sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 12px;
      position: relative;
      overflow-x: hidden;
    }

    /* Fond forêt */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("foret-atelier.jpg") center center / cover no-repeat fixed;
      filter: blur(3px) brightness(0.7);
      transform: scale(1.03);
      z-index: -2;
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(246, 236, 220, 0.6);
      z-index: -1;
    }

    .card {
      max-width: 980px;
      width: 100%;
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border-soft);
      padding: 18px 16px 22px;
      backdrop-filter: blur(10px);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 10px;
    }

    h1 {
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--accent);
      margin: 0;
    }

    .user-info {
      font-size: 0.82rem;
      color: var(--text-soft);
      text-align: right;
    }

    .logout-btn {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #b83a3a;
      background: #d44949;
      color: #fff;
      cursor: pointer;
      font-size: 0.78rem;
      margin-left: 8px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      margin-top: 4px;
    }

    .toolbar-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      font-size: 0.8rem;
      color: var(--text-soft);
    }

    .toolbar label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.10em;
    }

    .toolbar input,
    .toolbar select {
      border-radius: 999px;
      border: 1px solid rgba(133,101,73,0.4);
      padding: 6px 10px;
      font-size: 0.85rem;
      background: #fffdf8;
      outline: none;
    }

    .toolbar button {
      padding: 6px 10px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      background: #d6a85a;
      color: #fff;
      box-shadow: 0 3px 8px rgba(0,0,0,0.16);
      white-space: nowrap;
    }

    /* 🔹 Boutons liens "Créer un bijou" et "Retour site" */
    .toolbar a.btn-primary {
      padding: 6px 12px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.8rem;
      background: var(--accent);
      color: #fff;
      border: 1px solid var(--accent-dark);
      box-shadow: 0 3px 8px rgba(0,0,0,0.16);
      white-space: nowrap;
    }
    .toolbar a.btn-primary:hover {
      background: var(--accent-dark);
    }

    .toolbar a.btn-secondary {
      padding: 6px 12px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.8rem;
      background: #fff;
      color: var(--accent);
      border: 1px solid var(--accent-soft);
      box-shadow: 0 3px 8px rgba(0,0,0,0.10);
      white-space: nowrap;
    }
    .toolbar a.btn-secondary:hover {
      background: var(--accent-soft);
      color: #4a321e;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fffdf8;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0,0,0,0.18);
      font-size: 0.85rem;
    }

    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #e4d5c3;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #eadcc8;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.76rem;
      color: var(--text-soft);
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .btn {
      padding: 5px 8px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 0.76rem;
      color: #fff;
      white-space: nowrap;
    }

    .btn-recharge { background: #82a738; }
    .btn-modif    { background: #b8833a; }
    .btn-suppr    { background: #b83a3a; }
    .btn-voir     { background: #6b7fb8; }

    .zone-msg {
      margin-top: 12px;
      font-size: 0.85rem;
      color: var(--text-soft);
    }

    .col-id {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.82rem;
    }

    .intention-snippet {
      font-size: 0.8rem;
      color: #7a5a45;
      max-width: 280px;
    }

    .small-muted {
      font-size: 0.76rem;
      color: #937b66;
      margin-top: 2px;
    }

    @media (max-width: 780px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }
      .user-info {
        text-align: left;
      }
      .toolbar {
        flex-direction: column;
        align-items: flex-start;
      }
      table, thead, tbody, th, td, tr {
        display: block;
      }
      thead {
        display: none;
      }
      tr {
        border-bottom: 1px solid #e4d5c3;
        margin-bottom: 6px;
        padding: 6px 2px;
      }
      td {
        border-bottom: none;
        padding: 4px 4px;
      }
      td::before {
        content: attr(data-label);
        display: block;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-soft);
        margin-bottom: 1px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <h1>DASHBOARD ARTISAN</h1>
      <div class="user-info" id="userInfo">Connexion en cours…</div>
    </header>

    <div class="toolbar">
      <div class="toolbar-group">
        <label for="search">Rechercher</label>
        <input id="search" type="text" placeholder="ID, prénom, intention…" />
      </div>
      <div class="toolbar-group">
        <label for="filterVoix">Voix</label>
        <select id="filterVoix">
          <option value="">Toutes</option>
          <option value="neutre">Neutre</option>
          <option value="feminine">Féminine</option>
          <option value="masculine">Masculine</option>
        </select>
      </div>
      <div class="toolbar-group">
        <button id="btnRefresh">🔄 Actualiser</button>
      </div>

      <!-- ⭐ NOUVEAUX BOUTONS : CRÉER + RETOUR SITE ⭐ -->
      <div class="toolbar-group">
        <a href="/create-bijou.html" class="btn-primary">➕ Créer un bijou</a>
        <a href="/index.html" class="btn-secondary">⬅️ Retour au site</a>
      </div>
    </div>

    <table id="tableBijoux">
      <thead>
        <tr>
          <th>ID</th>
          <th>Prénom</th>
          <th>Intention</th>
          <th>Restants</th>
          <th>Max</th>
          <th>Voix</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="zone-msg" id="msg"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://mchqysvhgnlixyjeserv.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jaHF5c3ZoZ25saXh5amVzZXJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM4NDE2OTYsImV4cCI6MjA3OTQxNzY5Nn0.vNE1iDPQeMls7RTqfFNS8Yxdlx_J2Jb9MgK4wcBtjWE";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const msg = document.getElementById("msg");
    const userInfo = document.getElementById("userInfo");
    const searchInput = document.getElementById("search");
    const filterVoix = document.getElementById("filterVoix");
    const btnRefresh = document.getElementById("btnRefresh");
    const tbody = document.querySelector("#tableBijoux tbody");

    let bijouxData = [];

    function normaliserTexte(str) {
      return (str || "")
        .toString()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    async function requireAuth() {
      const { data } = await supabase.auth.getSession();
      const session = data.session;

      if (!session) {
        window.location.href = "/login.html";
        return;
      }

      const email = session.user.email;
      userInfo.innerHTML = `
        Connecté en tant que ${email}
        <button class="logout-btn" onclick="logout()">Se déconnecter</button>
      `;

      chargerBijoux();
    }

    async function logout() {
      await supabase.auth.signOut();
      window.location.href = "/login.html";
    }

    async function chargerBijoux() {
      msg.textContent = "Chargement des données…";

      try {
        const r = await fetch("/api/listBijoux");
        const data = await r.json();

        // on suppose que l'API renvoie directement un tableau d'objets
        bijouxData = Array.isArray(data) ? data : (data.data || data.bijoux || []);

        rendreTable();
        msg.textContent = bijouxData.length
          ? `Bijoux chargés : ${bijouxData.length}`
          : "Aucun bijou enregistré pour le moment.";
      } catch (e) {
        console.error(e);
        msg.textContent = "Erreur lors du chargement des bijoux.";
      }
    }

    function rendreTable() {
      const terme = normaliserTexte(searchInput.value);
      const filtre = filterVoix.value;
      tbody.innerHTML = "";

      const filtered = bijouxData.filter((b) => {
        const id = normaliserTexte(b.id);
        const prenom = normaliserTexte(b.prenom);
        const intention = normaliserTexte(b.intention);
        const voix = (b.voix || "").toString();

        const okRecherche =
          !terme ||
          id.includes(terme) ||
          prenom.includes(terme) ||
          intention.includes(terme);

        const okVoix = !filtre || voix === filtre;

        return okRecherche && okVoix;
      });

      if (!filtered.length) {
        msg.textContent = "Aucun bijou pour ces filtres.";
        return;
      }

      filtered.forEach((b) => {
        const tr = document.createElement("tr");

        const tdId = document.createElement("td");
        tdId.className = "col-id";
        tdId.dataset.label = "ID";
        tdId.textContent = b.id;
        tr.appendChild(tdId);

        const tdPrenom = document.createElement("td");
        tdPrenom.dataset.label = "Prénom";
        tdPrenom.textContent = b.prenom || "-";
        tr.appendChild(tdPrenom);

        const tdIntention = document.createElement("td");
        tdIntention.dataset.label = "Intention";
        const snippet = (b.intention || "").toString();
        const court = snippet.length > 120 ? snippet.slice(0, 120) + "…" : snippet;
        tdIntention.innerHTML = `
          <div class="intention-snippet">${court || "<span class='small-muted'>—</span>"}</div>
        `;
        tr.appendChild(tdIntention);

        const tdRestants = document.createElement("td");
        tdRestants.dataset.label = "Restants";
        tdRestants.textContent =
          b.messages_restants != null ? b.messages_restants : "-";
        tr.appendChild(tdRestants);

        const tdMax = document.createElement("td");
        tdMax.dataset.label = "Max";
        tdMax.textContent = b.messages_max != null ? b.messages_max : "-";
        tr.appendChild(tdMax);

        const tdVoix = document.createElement("td");
        tdVoix.dataset.label = "Voix";
        tdVoix.textContent = b.voix || "-";
        tr.appendChild(tdVoix);

        const tdActions = document.createElement("td");
        tdActions.dataset.label = "Actions";

        const btnVoir = document.createElement("button");
        btnVoir.className = "btn btn-voir";
        btnVoir.textContent = "Voir le bijou";
        btnVoir.addEventListener("click", () => {
          if (!b.id) return;
          const url = `/bijou.html?id=${encodeURIComponent(b.id)}`;
          window.open(url, "_blank");
        });

        const btnRecharge = document.createElement("button");
        btnRecharge.className = "btn btn-recharge";
        btnRecharge.textContent = "Recharger";
        btnRecharge.addEventListener("click", async () => {
          await recharger(b.id);
        });

        const btnModif = document.createElement("button");
        btnModif.className = "btn btn-modif";
        btnModif.textContent = "Modifier";
        btnModif.addEventListener("click", () => {
          modifier(b.id);
        });

        const btnSuppr = document.createElement("button");
        btnSuppr.className = "btn btn-suppr";
        btnSuppr.textContent = "Supprimer";
        btnSuppr.addEventListener("click", async () => {
          await supprimerBijou(b.id);
        });

        tdActions.appendChild(btnVoir);
        tdActions.appendChild(btnRecharge);
        tdActions.appendChild(btnModif);
        tdActions.appendChild(btnSuppr);

        tr.appendChild(tdActions);

        tbody.appendChild(tr);
      });
    }

    async function recharger(id) {
      if (!id) return;
      if (!confirm(`Recharger les murmures pour le bijou ${id} ?`)) return;
      try {
        await fetch(`/api/rechargeBijou?id=${encodeURIComponent(id)}`);
        msg.textContent = `Bijou ${id} rechargé.`;
        chargerBijoux();
      } catch (e) {
        console.error(e);
        msg.textContent = "Erreur lors de la recharge.";
      }
    }

    async function supprimerBijou(id) {
      if (!id) return;
      if (!confirm(`Supprimer le bijou ${id} ?`)) return;
      try {
        await fetch(`/api/deleteBijou?id=${encodeURIComponent(id)}`);
        msg.textContent = `Bijou ${id} supprimé.`;
        chargerBijoux();
      } catch (e) {
        console.error(e);
        msg.textContent = "Erreur lors de la suppression.";
      }
    }

    function modifier(id) {
      if (!id) return;
      window.location.href = `/personnalisation.html?id=${encodeURIComponent(id)}`;
    }

    // Expose logout pour le bouton inline
    window.logout = logout;

    searchInput.addEventListener("input", rendreTable);
    filterVoix.addEventListener("change", rendreTable);
    btnRefresh.addEventListener("click", chargerBijoux);

    requireAuth();
  </script>
</body>
</html>
