<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Personalise the whisper – L’Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <p>Redirecting to the English personalization page…</p>

  <script>
    (function () {
      const current = new URL(window.location.href);
      const target = new URL(window.location.origin + "/personnalisation.html");

      current.searchParams.forEach((value, key) => {
        if (key.toLowerCase() !== "lang") {
          target.searchParams.set(key, value);
        }
      });

      target.searchParams.set("lang", "en");

      window.location.href = target.toString();
    })();
  </script>
</body>
</html>
