<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Whisper of the jewel – The Atelier of Invisible Bonds</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Typewriter font -->
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-card: rgba(255, 250, 243, 0.96);
      --accent: #b8833a;
      --accent-soft: #eadcc8;
      --text-main: #2e241b;
      --text-soft: #5a4335;
      --border-soft: rgba(170, 140, 90, 0.55);
      --shadow-soft: 0 18px 40px rgba(0,0,0,0.32);
      --radius-xl: 26px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Helvetica Neue", Arial, sans-serif;
      background: url("foret-atelier.jpg") center/cover fixed no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 10px;
      color: var(--text-main);
      position: relative;
      overflow: hidden;
    }

    /* Blur + veil for readability */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: inherit;
      filter: blur(3px) brightness(0.7);
      transform: scale(1.03);
      z-index: -2;
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(246, 236, 220, 0.62);
      z-index: -1;
    }

    .card {
      max-width: 760px;
      width: 100%;
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border-soft);
      padding: 22px 20px 26px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    h1 {
      font-size: 0.95rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 6px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-soft);
      margin-bottom: 8px;
    }

    .badge-id {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 14px;
      background: #f5ebdd;
      border: 1px solid rgba(170, 140, 90, 0.45);
      font-size: 0.82rem;
      margin-bottom: 8px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #4caf50;
    }

    .state {
      font-size: 0.86rem;
      color: #82644a;
      margin-bottom: 10px;
    }

    .theme-line {
      font-size: 0.82rem;
      color: #73553d;
      margin-bottom: 4px;
    }

    /* Typewriter style bubble */
    .whisper {
      position: relative;
      font-family: "Special Elite", "Courier New", Courier, ui-monospace, monospace;
      font-size: 1.05rem;
      line-height: 1.55;
      letter-spacing: 0.02em;
      color: #2b241c;
      background: rgba(255,250,243,0.9);
      border-radius: 8px;
      padding: 16px 16px;
      border: 1px solid rgba(0,0,0,0.12);
      box-shadow:
        inset 0 0 6px rgba(0,0,0,0.05),
        0 3px 8px rgba(0,0,0,0.14);
      text-shadow: 0px 1px rgba(0,0,0,0.08);
      margin: 14px 0 8px;
      min-height: 4.2em;
      text-align: left;
      white-space: pre-wrap;
    }

    .whisper::after {
      content: "▌";
      margin-left: 4px;
      animation: blink 0.7s infinite;
      opacity: 1;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    .counter {
      font-size: 0.82rem;
      color: #7a6450;
      margin-top: 4px;
    }

    .controls {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      font-size: 0.88rem;
      color: #6a5440;
    }

    .btn {
      border-radius: 999px;
      border: none;
      padding: 9px 16px;
      font-size: 0.88rem;
      cursor: pointer;
      background: #d6a85a;
      color: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.18);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: wait;
      box-shadow: none;
    }

    .btn-secondary {
      background: #fff;
      color: var(--accent);
      border: 1px solid var(--accent-soft);
      box-shadow: 0 3px 8px rgba(0,0,0,0.16);
    }

    .hint {
      font-size: 0.78rem;
      color: #8a725b;
      margin-top: 8px;
    }

    /* Subtle golden particles overlay */
    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: radial-gradient(circle, #ffd98a 0%, rgba(255,217,138,0) 70%);
      opacity: 0.0;
      animation: floatUp 6s linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(20px) translateX(0);
        opacity: 0;
      }
      20% {
        opacity: 0.7;
      }
      80% {
        opacity: 0.7;
      }
      100% {
        transform: translateY(-40px) translateX(10px);
        opacity: 0;
      }
    }

    @media (max-width: 640px) {
      .card {
        border-radius: 20px;
        padding: 18px 16px 22px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="particles" id="particlesContainer"></div>

    <h1>THE ATELIER OF INVISIBLE BONDS</h1>
    <div class="subtitle">The wooden jewel’s whisper.</div>

    <div class="badge-id" id="badgeId">
      <span class="dot"></span>
      <span>Jewel ID: <strong id="idDisplay">...</strong></span>
    </div>

    <div class="state" id="stateText">
      The jewel is reaching for its voice…
    </div>

    <div class="theme-line" id="themeLine"></div>

    <div class="whisper" id="whisper">
      The whisper will appear here…
    </div>

    <div class="counter" id="counterText">
      Remaining whispers: updating…
    </div>

    <div class="controls">
      <button class="btn" id="btnReplay" disabled>
        ▶️ Listen again
      </button>
      <button class="btn btn-secondary" id="btnNew">
        ✨ Get a new whisper
      </button>
    </div>

    <div class="hint">
      Bring the jewel close to the phone again to call a new whisper.
    </div>
  </div>

  <script>
    // Helper: read query param ?id=...
    function getQueryParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    const jewelId = getQueryParam("id") || "TEST001";

    const idDisplay   = document.getElementById("idDisplay");
    const stateText   = document.getElementById("stateText");
    const themeLine   = document.getElementById("themeLine");
    const whisperEl   = document.getElementById("whisper");
    const counterText = document.getElementById("counterText");
    const btnReplay   = document.getElementById("btnReplay");
    const btnNew      = document.getElementById("btnNew");

    idDisplay.textContent = jewelId;

    let currentAudio = null;
    let isTyping = false;

    // Small glowing particles
    function initParticles() {
      const container = document.getElementById("particlesContainer");
      const count = 14;
      for (let i = 0; i < count; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        const left = Math.random() * 100;
        const top = 40 + Math.random() * 40;
        const delay = Math.random() * 6;
        p.style.left = left + "%";
        p.style.top = top + "%";
        p.style.animationDelay = delay + "s";
        container.appendChild(p);
      }
    }
    initParticles();

    // Fake counter update on client (we don't know the exact value returned)
    function updateCounterText(decrement) {
      const current = counterText.textContent;
      const match = current.match(/(\d+)/);
      if (!match) {
        if (decrement) {
          counterText.textContent = "Remaining whispers: …";
        }
        return;
      }
      const n = parseInt(match[1], 10);
      const newN = Math.max(n - 1, 0);
      counterText.textContent = "Remaining whispers: " + newN;
    }

    // Typewriter effect for the whisper
    function typeWriterEffect(text) {
      isTyping = true;
      whisperEl.textContent = "";
      let idx = 0;

      function step() {
        if (idx <= text.length) {
          whisperEl.textContent = text.slice(0, idx);
          idx++;
          const c = text.charAt(idx - 1);
          let baseDelay = 30;
          if (c === "." || c === "…" || c === "!" || c === "?") {
            baseDelay = 220;
          } else if (c === "," || c === ";") {
            baseDelay = 120;
          }
          requestAnimationFrame(() => {
            setTimeout(step, baseDelay);
          });
        } else {
          isTyping = false;
        }
      }
      step();
    }

    async function callWhisperAPI() {
      if (isTyping) return;

      stateText.textContent = "The jewel is calling its whisper…";
      btnNew.disabled = true;
      btnReplay.disabled = true;
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }

      try {
        const url = `/api/message?id=${encodeURIComponent(jewelId)}&lang=en`;
        const r = await fetch(url);
        const data = await r.json();

        const text = (data.text || "").trim();
        const audio = data.audio || null;

        if (!text) {
          whisperEl.textContent =
            "The jewel stays silent, but it is still here with you.";
          stateText.textContent = "The whisper could not be reached.";
          btnNew.disabled = false;
          return;
        }

        // For now we don't know theme/sous-theme in this page → just clear it
        themeLine.textContent = "";

        // Typewriter
        typeWriterEffect(text);

        // Simple “remaining” message (we don't have the exact number from the API)
        counterText.textContent =
          "Remaining whispers: one has just been used.";

        // Audio
        if (audio) {
          currentAudio = new Audio(audio);
          currentAudio.play().catch(() => {});
          btnReplay.disabled = false;
        } else {
          btnReplay.disabled = true;
        }

        stateText.textContent = "A new whisper has just been received.";
      } catch (e) {
        console.error(e);
        whisperEl.textContent =
          "The jewel tried to speak, but the connection broke. Try again in a moment.";
        stateText.textContent = "Connection error.";
      } finally {
        btnNew.disabled = false;
      }
    }

    btnNew.addEventListener("click", () => {
      callWhisperAPI();
    });

    btnReplay.addEventListener("click", () => {
      if (!currentAudio) return;
      currentAudio.currentTime = 0;
      currentAudio.play().catch(() => {});
    });

    // First call on load
    callWhisperAPI();
  </script>
</body>
</html>
