<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Accéder à votre bijou – L’Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg-card: rgba(255,250,243,0.98);
      --accent: #b8833a;
      --accent-soft: #eadcc8;
      --text-main: #2e241b;
      --text-soft: #5a4335;
      --border-soft: rgba(170, 140, 90, 0.55);
      --shadow-soft: 0 16px 40px rgba(0,0,0,0.32);
      --radius-xl: 26px;
    }

    html { overflow-y: scroll; }
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 12px;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("foret-atelier.jpg") center center / cover no-repeat fixed;
      filter: blur(3px) brightness(0.7);
      transform: scale(1.03);
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(246,236,220,0.6);
      z-index: -1;
    }

    .card {
      max-width: 900px;
      width: 100%;
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border-soft);
      padding: 26px 20px 24px;
      backdrop-filter: blur(10px);
    }

    .logo-title {
      font-size: 1.02rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .logo-sub {
      font-size: 0.9rem;
      color: var(--text-soft);
      margin-bottom: 14px;
    }

    h2 {
      text-align: center;
      margin: 8px 0 4px;
      font-size: 1.1rem;
    }

    .intro {
      text-align: center;
      font-size: 0.94rem;
      color: var(--text-soft);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 999px;
      border: 1px solid var(--accent-soft);
      background: #fffdf8;
      font-size: 0.96rem;
    }

    .main-btn {
      margin-top: 16px;
      width: 100%;
      border-radius: 999px;
      padding: 13px 18px;
      font-size: 1rem;
      cursor: pointer;
      background: #d39633;
      color: #fff;
      font-weight: 600;
      box-shadow: 0 12px 24px rgba(0,0,0,0.25);
    }

    .status {
      margin-top: 14px;
      font-size: 0.9rem;
      color: var(--text-soft);
    }

    .status.error {
      color: #b03a3a;
    }

    .result {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px dashed rgba(170,140,90,0.5);
      font-size: 0.9rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 12px;
      background: #f5ebdd;
      border: 1px solid var(--border-soft);
      font-size: 0.82rem;
      margin-bottom: 8px;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #82a738;
    }

    .actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-direction: column;
    }

    @media (min-width: 640px) {
      .actions { flex-direction: row; }
    }

    .btn-secondary, .btn-ghost {
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      justify-content: center;
      width: 100%;
    }

    .btn-secondary {
      background: #d39633;
      color: #fff;
      border: 1px solid #a86b1e;
      box-shadow: 0 8px 18px rgba(0,0,0,0.22);
    }

    .btn-ghost {
      background: #fff;
      color: var(--accent);
      border: 1px solid var(--accent-soft);
    }

    .info-bottom {
      margin-top: 18px;
      font-size: 0.84rem;
      color: #8a6c4c;
    }
  </style>
</head>

<body>
  <div class="card">
    <div>
      <div class="logo-title">L’ATELIER DES LIENS INVISIBLES</div>
      <div class="logo-sub">Accédez au murmure de votre bijou.</div>
    </div>

    <h2>Retrouvez votre bijou</h2>
    <p class="intro">
      Indiquez le <strong>code de votre bijou</strong> (carte ou NFC), et nous vous guiderons vers son murmure.
    </p>

    <label for="codeInput">Code du bijou</label>
    <input id="codeInput" type="text" placeholder="ex : BQ92A1" />

    <button id="searchBtn" class="main-btn">🔍 Trouver mon bijou</button>

    <div id="status" class="status">En attente de votre code…</div>

    <div id="result" class="result" style="display:none;"></div>

    <div class="info-bottom">
      En cas de difficulté, contactez l’Atelier.
    </div>
  </div>

  <script>
    const input = document.getElementById("codeInput");
    const statusEl = document.getElementById("status");
    const result = document.getElementById("result");
    const btn = document.getElementById("searchBtn");

    let currentBijou = null;

    async function searchBijou() {
      const code = input.value.trim();

      if (!code) {
        alert("Merci d’indiquer un code.");
        return;
      }

      statusEl.textContent = "Recherche du bijou…";
      statusEl.classList.remove("error");
      btn.disabled = true;
      result.style.display = "none";
      result.innerHTML = "";

      try {
        const r = await fetch(`/api/getBijou?code=${encodeURIComponent(code)}`);
        const data = await r.json();
        btn.disabled = false;

        if (!data.ok || !data.bijou) {
          statusEl.textContent = "Aucun bijou trouvé.";
          statusEl.classList.add("error");
          return;
        }

        const bijou = data.bijou;
        currentBijou = bijou;

        const publicId = bijou.public_id;
        const prenom = bijou.prenom || "une personne";
        const theme = bijou.theme || "Non défini";

        const restants = bijou.messages_restants;
        const max = bijou.messages_max;

        const compteur =
          restants != null && max != null
            ? `Il reste ${restants} murmure(s) sur ${max}.`
            : "";

        statusEl.textContent = "Bijou trouvé.";

        const listenUrl = `/b.html?public_id=${encodeURIComponent(publicId)}`;

        result.innerHTML = `
          <div class="badge">
            <div class="badge-dot"></div>
            <span>Code bijou : ${publicId}</span>
          </div>

          <div>
            Relié à <strong>${prenom}</strong><br/>
            Thème : <strong>${theme}</strong><br/>
            ${compteur}
          </div>

          <div class="actions">
            <a class="btn-secondary" href="${listenUrl}">🎧 Écouter</a>
            <a id="rechargeBtn" class="btn-ghost" href="#">➕ Recharger</a>
          </div>
        `;

        result.style.display = "block";

        // RECHARGE
        document.getElementById("rechargeBtn").onclick = async (e) => {
          e.preventDefault();
          const resp = await fetch("/api/createCheckoutSession", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ public_id: publicId })
          });
          const out = await resp.json();
          if (out.url) {
            window.location.href = out.url;
          } else {
            alert("Service momentanément indisponible.");
          }
        };

      } catch (err) {
        console.error(err);
        btn.disabled = false;
        statusEl.textContent = "Erreur lors de la recherche.";
        statusEl.classList.add("error");
      }
    }

    btn.onclick = searchBijou;
    input.onkeydown = (e) => {
      if (e.key === "Enter") searchBijou();
    };
  </script>
</body>
</html>
