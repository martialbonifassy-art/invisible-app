<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>J’ai déjà un bijou – L’Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    /* Switch FR / EN global */
.lang-switch {
  display: inline-flex;
  background: #f7ecdd;
  border-radius: 999px;
  padding: 3px;
  border: 1px solid rgba(170, 140, 90, 0.45);
  gap: 3px;
  align-items: center;
}

.lang-btn {
  border-radius: 999px;
  border: none;
  padding: 4px 10px;
  font-size: 0.78rem;
  cursor: pointer;
  background: transparent;
  color: #5a4335; /* tu peux ajuster */
}

.lang-btn.active {
  background: #b8833a;
  color: #fff;
  font-weight: 600;
}

    :root {
      --bg-card: rgba(255,250,243,0.98);
      --accent: #b8833a;
      --accent-dark: #8a5f25;
      --accent-soft: #eadcc8;
      --text-main: #2e241b;
      --text-soft: #5a4335;
      --border-soft: rgba(170, 140, 90, 0.55);
      --shadow-soft: 0 14px 34px rgba(0,0,0,0.26);
      --radius-xl: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Helvetica Neue", Arial, sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 12px;
      position: relative;
      overflow: hidden;
    }

    /* 🌲 Fond forêt identique aux autres pages */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("foret-atelier.jpg") center center / cover no-repeat fixed;
      filter: blur(3px) brightness(0.7);
      transform: scale(1.03);
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(246, 236, 220, 0.6);
      z-index: -1;
    }

    /* Carte centrale */
    .card {
      max-width: 520px;
      width: 100%;
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border-soft);
      padding: 22px 20px 26px;
      backdrop-filter: blur(10px);
      position: relative;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      text-align: center;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.83rem;
      color: var(--text-soft);
      text-align: center;
      margin-bottom: 16px;
    }

    /* Switch langue */
    .lang-switch {
      position: absolute;
      top: 12px;
      right: 14px;
      display: inline-flex;
      background: #f7ecdd;
      border-radius: 999px;
      padding: 3px;
      border: 1px solid rgba(170, 140, 90, 0.45);
      gap: 3px;
    }

    .lang-btn {
      border-radius: 999px;
      border: none;
      padding: 4px 10px;
      font-size: 0.78rem;
      cursor: pointer;
      background: transparent;
      color: var(--text-soft);
    }

    .lang-btn.active {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    label {
      display: block;
      margin-top: 14px;
      font-size: 0.87rem;
      color: var(--text-soft);
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--accent-soft);
      background: rgba(255,255,255,0.9);
      margin-top: 6px;
      font-size: 0.9rem;
      color: var(--text-main);
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(184,131,58,0.25);
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px 18px;
      border-radius: 18px;
      border: 1px solid var(--accent-dark);
      background: var(--accent);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 10px 22px rgba(0,0,0,0.25);
      transition: 0.2s;
    }

    button:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
    }

    .hint {
      margin-top: 10px;
      font-size: 0.83rem;
      color: var(--text-soft);
    }

    .small {
      margin-top: 8px;
      font-size: 0.78rem;
      color: var(--text-soft);
      opacity: 0.9;
    }

    .error {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #b03a3a;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="lang-switch">
      <button type="button" class="lang-btn" id="langFr">FR</button>
      <button type="button" class="lang-btn" id="langEn">EN</button>
    </div>

    <div class="logo">L’ATELIER DES LIENS INVISIBLES</div>
    <div class="subtitle" id="subtitle">
      Indiquez le code de votre bijou pour le retrouver.
    </div>

    <label for="codeInput" id="labelCode">Code du bijou :</label>
    <input type="text" id="codeInput" placeholder="ex : 95QN27" />

    <button id="openBtn">Accéder à mon bijou</button>

    <div class="hint" id="hint">
      Le code se trouve sur la carte reçue avec le bijou, ou dans l’e-mail de confirmation.
    </div>

    <div class="small" id="small">
      Si vous scannez directement la puce NFC, vous n’avez normalement pas besoin de cette page.
    </div>

    <div class="error" id="errorZone" style="display:none;"></div>
  </div>

  <script>
    const subtitleEl = document.getElementById("subtitle");
    const labelCodeEl = document.getElementById("labelCode");
    const hintEl = document.getElementById("hint");
    const smallEl = document.getElementById("small");
    const errorEl = document.getElementById("errorZone");
    const codeInput = document.getElementById("codeInput");
    const openBtn = document.getElementById("openBtn");

    const btnFr = document.getElementById("langFr");
    const btnEn = document.getElementById("langEn");

    let UI_LANG = "fr";

    function detectUiLang() {
      const url = new URL(window.location.href);
      const paramLang = (url.searchParams.get("lang") || "").toLowerCase();
      if (paramLang === "fr" || paramLang === "en") return paramLang;

      const navLang = (navigator.language || navigator.userLanguage || "fr").toLowerCase();
      if (navLang.startsWith("en")) return "en";

      return "fr";
    }

    function updateLangSwitchUi() {
      if (UI_LANG === "en") {
        btnEn.classList.add("active");
        btnFr.classList.remove("active");
        document.documentElement.lang = "en";
      } else {
        btnFr.classList.add("active");
        btnEn.classList.remove("active");
        document.documentElement.lang = "fr";
      }
    }

    function updateStaticTexts() {
      if (UI_LANG === "en") {
        subtitleEl.textContent = "Enter the code of your jewel to find it.";
        labelCodeEl.textContent = "Jewel code:";
        codeInput.placeholder = "e.g.: 95QN27";
        openBtn.textContent = "Access my jewel";
        hintEl.textContent =
          "The code is written on the card received with the jewel, or in the confirmation email.";
        smallEl.textContent =
          "If you scan the NFC tag directly, you normally don’t need this page.";
      } else {
        subtitleEl.textContent =
          "Indiquez le code de votre bijou pour le retrouver.";
        labelCodeEl.textContent = "Code du bijou :";
        codeInput.placeholder = "ex : 95QN27";
        openBtn.textContent = "Accéder à mon bijou";
        hintEl.textContent =
          "Le code se trouve sur la carte reçue avec le bijou, ou dans l’e-mail de confirmation.";
        smallEl.textContent =
          "Si vous scannez directement la puce NFC, vous n’avez normalement pas besoin de cette page.";
      }
    }

    function setLangAndReload(lang) {
      const url = new URL(window.location.href);
      url.searchParams.set("lang", lang);
      window.location.href = url.toString();
    }

    btnFr.addEventListener("click", () => setLangAndReload("fr"));
    btnEn.addEventListener("click", () => setLangAndReload("en"));

    openBtn.addEventListener("click", () => {
      const code = (codeInput.value || "").trim();
      if (!code) {
        errorEl.style.display = "block";
        errorEl.textContent =
          UI_LANG === "en"
            ? "Please enter the code of your jewel."
            : "Veuillez entrer le code de votre bijou.";
        return;
      }
      errorEl.style.display = "none";

      const target = new URL(window.location.origin + "/b.html");
      target.searchParams.set("code", code);
      target.searchParams.set("lang", UI_LANG);
      window.location.href = target.toString();
    });

    // Init
    UI_LANG = detectUiLang();
    updateLangSwitchUi();
    updateStaticTexts();
  </script>
  <script src="/lang-switch.js"></script>
</body>
</html>
