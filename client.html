<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Personnalisation du bijou – Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg-card: rgba(255,250,243,0.98);
      --accent: #b8833a;
      --accent-dark: #8a5f25;
      --accent-soft: #eadcc8;
      --text-main: #2e241b;
      --text-soft: #5a4335;
      --border-soft: rgba(170, 140, 90, 0.55);
      --shadow-soft: 0 14px 34px rgba(0,0,0,0.26);
      --radius-xl: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Helvetica Neue", Arial, sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 12px;
      position: relative;
      overflow: hidden;
    }

    /* 🌲 Fond forêt identique aux autres pages */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("foret-atelier.jpg") center center / cover no-repeat fixed;
      filter: blur(3px) brightness(0.7);
      transform: scale(1.03);
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(246, 236, 220, 0.6);
      z-index: -1;
    }

    /* Carte centrale */
    .card {
      max-width: 520px;
      width: 100%;
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border-soft);
      padding: 22px 20px 26px;
      backdrop-filter: blur(10px);
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .card-header-text {
      flex: 1;
      min-width: 0;
    }

    .logo {
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      text-align: left;
      margin-bottom: 4px;
      white-space: nowrap;
    }

    .subtitle {
      font-size: 0.83rem;
      color: var(--text-soft);
      text-align: left;
      margin-bottom: 0;
    }

    .lang-switch {
      display: flex;
      gap: 4px;
      font-size: 0.8rem;
    }

    .lang-switch button {
      border-radius: 999px;
      padding: 4px 9px;
      border: 1px solid var(--accent-soft);
      background: #fff;
      color: var(--text-soft);
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 500;
    }

    .lang-switch button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .id-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid var(--accent-soft);
      background: rgba(250, 240, 225, 0.95);
      font-size: 0.8rem;
      color: var(--text-soft);
      margin: 12px auto 18px;
      display: block;
      width: fit-content;
    }

    label {
      display: block;
      margin-top: 14px;
      font-size: 0.87rem;
      color: var(--text-soft);
      font-weight: 600;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--accent-soft);
      background: rgba(255,255,255,0.9);
      margin-top: 6px;
      font-size: 0.88rem;
      color: var(--text-main);
      outline: none;
    }

    textarea {
      resize: none;
      height: 70px;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(184,131,58,0.25);
    }

    button#saveBtn {
      width: 100%;
      margin-top: 20px;
      padding: 12px 18px;
      border-radius: 18px;
      border: 1px solid var(--accent-dark);
      background: var(--accent);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 10px 22px rgba(0,0,0,0.25);
      transition: 0.2s;
    }

    button#saveBtn:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
    }

    #result {
      margin-top: 14px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-soft);
    }
  </style>

  <script>
    function switchLanguage(lang) {
      const file = window.location.pathname.split("/").pop() || "client.html";

      const mapping = {
        "client.html": { fr: "client.html", en: "client-en.html" },
        "client-en.html": { fr: "client.html", en: "client-en.html" },

        "index.html": { fr: "index.html", en: "index-en.html" },
        "index-en.html": { fr: "index.html", en: "index-en.html" },
        "personnalisation.html": { fr: "personnalisation.html", en: "personnalisation-en.html" },
        "personnalisation-en.html": { fr: "personnalisation.html", en: "personnalisation-en.html" },
        "bijou.html": { fr: "bijou.html", en: "bijou-en.html" },
        "bijou-en.html": { fr: "bijou.html", en: "bijou-en.html" },
        "dashboard.html": { fr: "dashboard.html", en: "dashboard-en.html" },
        "dashboard-en.html": { fr: "dashboard.html", en: "dashboard-en.html" }
      };

      localStorage.setItem("preferred_lang", lang);

      const target =
        (mapping[file] && mapping[file][lang]) ||
        (lang === "fr" ? "client.html" : "client-en.html");

      window.location.href = "/" + target + window.location.search;
    }

    document.addEventListener("DOMContentLoaded", () => {
      const file = window.location.pathname.split("/").pop() || "client.html";
      const currentLang = file.includes("-en") ? "en" : "fr";
      const btn = document.querySelector(".lang-" + currentLang);
      if (btn) btn.classList.add("active");
    });
  </script>
</head>

<body>
  <div class="card">

    <div class="card-header-row">
      <div class="card-header-text">
        <div class="logo">L’ATELIER DES LIENS INVISIBLES</div>
        <div class="subtitle">Personnalisez la voix associée à votre bijou.</div>
      </div>
      <div class="lang-switch">
        <button type="button" class="lang-fr" onclick="switchLanguage('fr')">FR</button>
        <button type="button" class="lang-en" onclick="switchLanguage('en')">EN</button>
      </div>
    </div>
