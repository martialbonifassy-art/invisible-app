<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Personnaliser le murmure – L’Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg-page: #f7efe2;
      --bg-card: #fffaf3;
      --accent: #b8833a;
      --accent-soft: #eadcc8;
      --text-main: #3c2f25;
      --text-soft: #7f6248;
      --border-soft: rgba(170, 140, 90, 0.35);
      --shadow-soft: 0 14px 30px rgba(0,0,0,0.12);
      --radius-xl: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Helvetica Neue", Arial, sans-serif;
      background: var(--bg-page);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      padding: 24px 12px 40px;
    }

    .page {
      max-width: 720px;
      width: 100%;
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      padding: 22px 18px 26px;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border-soft);
      position: relative;
    }

    h1 {
      font-size: 1.1rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 4px;
    }
    .slogan {
      font-size: 0.9rem;
      color: var(--text-soft);
      margin-bottom: 14px;
    }
    .intro {
      font-size: 0.88rem;
      margin-bottom: 16px;
      color: var(--text-soft);
    }

    label {
      display: block;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.11em;
      color: #856549;
      margin-bottom: 4px;
    }

    input, textarea, select {
      width: 100%;
      box-sizing: border-box;
      border-radius: 999px;
      border: 1px solid rgba(133,101,73,0.4);
      padding: 8px 12px;
      font-size: 0.9rem;
      margin-bottom: 12px;
      background: #fffdf8;
      outline: none;
    }

    textarea {
      border-radius: 16px;
      min-height: 70px;
      resize: vertical;
    }

    select {
      appearance: none;
      -moz-appearance: none;
      -webkit-appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, #b8833a 50%),
        linear-gradient(135deg, #b8833a 50%, transparent 50%);
      background-position:
        calc(100% - 16px) calc(50% - 3px),
        calc(100% - 10px) calc(50% - 3px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
    }

    .ligne {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
    }
    .ligne > div { flex: 1; }

    button {
      border-radius: 999px;
      border: none;
      padding: 10px 18px;
      font-size: 0.9rem;
      cursor: pointer;
      background: #d6a85a;
      color: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.16);
      margin-top: 6px;
      width: 100%;
    }
    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .buttons-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }
    @media (min-width: 600px) {
      .buttons-row {
        flex-direction: row;
      }
      .buttons-row button {
        width: auto;
        flex: 1;
      }
    }

    .preview {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 16px;
      background: #f3e3cc;
      font-size: 0.94rem;
      min-height: 3em;
      white-space: pre-wrap;
    }

    .etat {
      font-size: 0.8rem;
      color: #a08967;
      margin-top: 8px;
    }

    .note-tech {
      margin-top: 16px;
      font-size: 0.8rem;
      color: #8a735a;
    }

    .id-url {
      font-family: monospace;
      font-size: 0.78rem;
      background: #f0e3cf;
      padding: 6px 8px;
      border-radius: 8px;
      margin-top: 4px;
      word-break: break-all;
    }

    .helper-card {
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 14px;
      background: #f8ecda;
      border: 1px solid #e0c8a2;
      font-size: 0.84rem;
    }
    .helper-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.11em;
      color: #7a5a3c;
      margin-bottom: 4px;
    }
    .helper-desc {
      margin-bottom: 6px;
      color: #5d4632;
    }
    .helper-example-label {
      font-weight: 600;
      font-size: 0.8rem;
      margin-bottom: 2px;
    }
    .helper-example {
      font-style: italic;
      color: #4a3523;
    }

    /* switch langue en haut à droite de la carte */
    .lang-switch-container {
      position: absolute;
      top: 14px;
      right: 18px;
    }
    .lang-switch {
      display: flex;
      gap: 4px;
      font-size: 0.8rem;
    }
    .lang-switch button {
      border-radius: 999px;
      padding: 4px 9px;
      border: 1px solid var(--accent-soft);
      background: #fff;
      color: var(--text-soft);
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 500;
      box-shadow: none;
      margin-top: 0;
      width: auto;
    }
    .lang-switch button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
  </style>

  <script>
    // Switch de langue réutilisable
    function switchLanguage(lang) {
      const file = window.location.pathname.split("/").pop() || "personnalisation.html";

      const mapping = {
        "personnalisation.html": { fr: "personnalisation.html", en: "personnalisation-en.html" },
        "personnalisation-en.html": { fr: "personnalisation.html", en: "personnalisation-en.html" },

        "index.html": { fr: "index.html", en: "index-en.html" },
        "index-en.html": { fr: "index.html", en: "index-en.html" },
        "client.html": { fr: "client.html", en: "client-en.html" },
        "client-en.html": { fr: "client.html", en: "client-en.html" },
        "bijou.html": { fr: "bijou.html", en: "bijou-en.html" },
        "bijou-en.html": { fr: "bijou.html", en: "bijou-en.html" },
        "dashboard.html": { fr: "dashboard.html", en: "dashboard-en.html" },
        "dashboard-en.html": { fr: "dashboard.html", en: "dashboard-en.html" }
      };

      localStorage.setItem("preferred_lang", lang);

      const target =
        (mapping[file] && mapping[file][lang]) ||
        (lang === "fr" ? "personnalisation.html" : "personnalisation-en.html");

      // on conserve les éventuels paramètres ?id=...
      window.location.href = "/" + target + window.location.search;
    }

    document.addEventListener("DOMContentLoaded", () => {
      const file = window.location.pathname.split("/").pop() || "personnalisation.html";
      const currentLang = file.includes("-en") ? "en" : "fr";
      const btn = document.querySelector(".lang-" + currentLang);
      if (btn) btn.classList.add("active");
    });
  </script>
</head>
<body>

    <div class="lang-switch-container">
      <div class="lang-switch">
        <button type="button" class="lang-fr" onclick="switchLanguage('fr')">FR</button>
        <button type="button" class="lang-en" onclick="switchLanguage('en')">EN</button>
      </div>
    </div>

      simples : l’IA se charge du reste.
    </p>

        <input id="idBijou" type="text" placeholder="ex : BIJOU001" />

        <select id="voix">
          <option value="neutre">Neutre</option>
          <option value="feminine">Féminine</option>
          <option value="masculine">Masculine</option>
        </select>
      </div>
    </div>
