<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Murmure du bijou</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <h1>Message du bijou</h1>
  <p id="msg">Chargement du murmure…</p>

  <script>
    // Récupérer l'id dans l'URL : ?id=XXX
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id") || "TEST";

    fetch(`/api/message?id=${encodeURIComponent(id)}`)
      .then(r => r.json())
      .then(data => {
        document.getElementById("msg").textContent =
          data.text || "Je suis là, silencieux, mais présent pour toi.";
      })
      .catch(err => {
        console.error(err);
        document.getElementById("msg").textContent =
          "Impossible de joindre la voix du bijou.";
      });
  </script>
</body>
</html>
