<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Murmure du bijou – L’Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Police machine à écrire -->
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",

      background: url("foret-atelier.jpg") center/cover fixed no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 10px;
      color: #3c2f25;
    }

    .carte {
      max-width: 720px;
      width: 100%;
      background: rgba(255, 250, 243, 0.96);
      border-radius: 28px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.20);
      border: 1px solid rgba(170, 140, 90, 0.45);
      padding: 22px 22px 26px;
      text-align: center;
    }

    h1 {
      font-size: 0.95rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #b8833a;
      margin: 0 0 6px;
    }

    .sous-titre {
      font-size: 0.9rem;
      color: #7f6248;
      margin-bottom: 12px;
    }

    .badge-id {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 14px;
      background: #f5ebdd;
      border: 1px solid rgba(170, 140, 90, 0.45);
      font-size: 0.82rem;
      margin-bottom: 12px;
    }
    .pastille {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #4caf50;
    }

    .etat {
      font-size: 0.86rem;
      color: #82644a;
      margin-bottom: 10px;
    }

    /* STYLE MACHINE À ÉCRIRE */
    .murmure {
      position: relative;
      font-family: "Special Elite", "Courier New", Courier, ui-monospace, monospace;
      font-size: 1.15rem;
      line-height: 1.55;
      letter-spacing: 0.02em;
      color: #2b241c;
      background: rgba(255,250,243,0.8);
      border-radius: 6px;
      padding: 14px 16px;
      border: 1px solid rgba(0,0,0,0.12);
      box-shadow:
        inset 0 0 6px rgba(0,0,0,0.05),
        0 2px 4px rgba(0,0,0,0.06);
      text-shadow: 0px 1px rgba(0,0,0,0.08);
      margin: 16px 0 18px;
      min-height: 4em;
    }

    /* Curseur qui clignote façon machine à écrire */
    .murmure::after {
      content: "▌";
      margin-left: 4px;
      animation: blink 0.7s infinite;
      opacity: 1;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }
