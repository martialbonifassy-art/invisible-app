<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Murmure du bijou – L’Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Police machine à écrire -->
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #b8833a;
      --accent-soft: #eadcc8;
      --text-main: #2b241c;
      --text-soft: #7f6248;
      --card-bg: rgba(255, 250, 243, 0.96);
      --border-soft: rgba(170, 140, 90, 0.45);
      --shadow-soft: 0 18px 40px rgba(0,0,0,0.20);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Helvetica Neue", Arial, sans-serif;
      background: url("foret-atelier.jpg") center/cover fixed no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 10px;
      color: var(--text-main);
      position: relative;
      overflow: hidden;
    }

    /* voile léger sur la forêt pour la lisibilité */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 20%, rgba(255,255,255,0.45), transparent 55%),
                  radial-gradient(circle at 10% 80%, rgba(255,230,200,0.25), transparent 50%),
                  radial-gradient(circle at 90% 70%, rgba(210,190,160,0.25), transparent 50%),
                  rgba(0,0,0,0.30);
      pointer-events: none;
      z-index: -1;
    }

    .carte {
      max-width: 720px;
      width: 100%;
      background: var(--card-bg);
      border-radius: 28px;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border-soft);
      padding: 22px 22px 26px;
      text-align: center;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    h1 {
      font-size: 0.95rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 6px;
    }

    .sous-titre {
      font-size: 0.9rem;
      color: var(--text-soft);
      margin-bottom: 12px;
    }

    .badge-id {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 14px;
      background: #f5ebdd;
      border: 1px solid var(--border-soft);
      font-size: 0.82rem;
      margin-bottom: 10px;
    }
    .pastille {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #4caf50;
      box-shadow: 0 0 8px rgba(76,175,80,0.8);
    }

    .etat {
      font-size: 0.86rem;
      color: #82644a;
      margin-bottom: 10px;
    }

    /* Zone du murmure – machine à écrire + lueur */
    .murmure-wrapper {
      position: relative;
      margin: 16px 0 14px;
    }

    .murmure {
      position: relative;
      font-family: "Special Elite", "Courier New", Courier, ui-monospace, monospace;
      font-size: 1.08rem;
      line-height: 1.6;
      letter-spacing: 0.02em;
      color: var(--text-main);
      background: rgba(255,250,243,0.9);
      border-radius: 10px;
      padding: 14px 16px;
      border: 1px solid rgba(0,0,0,0.12);
      box-shadow:
        inset 0 0 6px rgba(0,0,0,0.06),
        0 2px 6px rgba(0,0,0,0.12);
      text-align: left;
      min-height: 4em;
      white-space: pre-wrap;
    }

    /* lueur dorée douce */
    .murmure::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: radial-gradient(circle at 20% 0%, rgba(255, 235, 190, 0.55), transparent 60%);
      mix-blend-mode: soft-light;
      opacity: 0.85;
      pointer-events: none;
      z-index: -1;
    }

    /* Curseur qui clignote façon machine à écrire */
    .murmure::after {
      content: "▌";
      margin-left: 4px;
      animation: blink 0.7s infinite;
      opacity: 1;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* Petits points lumineux flottants */
    .spark {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 223, 150, 0.9);
      box-shadow: 0 0 10px rgba(255, 223, 150, 0.95);
      opacity: 0.0;
      animation: floatSpark 6s linear infinite;
      pointer-events: none;
    }

    .spark:nth-child(1) { top: 12%; left: 16%; animation-delay: 0s; }
    .spark:nth-child(2) { top: 20%; right: 12%; animation-delay: 1.2s; }
    .spark:nth-child(3) { bottom: 18%; left: 26%; animation-delay: 2.4s; }
    .spark:nth-child(4) { bottom: 10%; right: 22%; animation-delay: 3.6s; }

    @keyframes floatSpark {
      0%   { transform: translateY(6px); opacity: 0; }
      10%  { opacity: 0.9; }
      60%  { opacity: 0.7; }
      100% { transform: translateY(-10px); opacity: 0; }
    }

    .compteur {
      font-size: 0.82rem;
      color: #7a6450;
      margin-top: 6px;
    }

    .note {
      font-size: 0.78rem;
      color: #a1896a;
      margin-top: 10px;
    }

    .note a {
      color: #8b6425;
      text-decoration: none;
    }

    .note a:hover {
      text-decoration: underline;
    }

    audio {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="carte">
    <h1>L’ATELIER DES LIENS INVISIBLES</h1>
    <div class="sous-titre">Murmure du bijou relié au bois et à l’IA.</div>

    <div class="badge-id">
      <span class="pastille"></span>
      <span id="badgeId">Bijou inconnu</span>
    </div>

    <div class="etat" id="etat">Le bijou se réveille…</div>

    <div class="murmure-wrapper">
      <!-- petits points lumineux -->
      <div class="spark"></div>
      <div class="spark"></div>
      <div class="spark"></div>
      <div class="spark"></div>

      <div class="murmure" id="murmure">
        Le murmure va apparaître ici…
      </div>
    </div>

    <!-- Audio du murmure (caché tant qu’il n’y a pas de son) -->
    <audio id="murmureAudio" controls style="margin-top:12px; width:100%; display:none;">
      Votre navigateur ne supporte pas la lecture audio.
    </audio>

    <div class="compteur" id="compteur"></div>

    <div class="note">
      Ce murmure est unique, généré à partir des paramètres choisis lors de la création du bijou.
      <br />
      Si quelque chose vous semble anormal, contactez l’atelier.
    </div>
  </div>

  <script>
    const murEl = document.getElementById("murmure");
    const etatEl = document.getElementById("etat");
    const badgeIdEl = document.getElementById("badgeId");
    const compteurEl = document.getElementById("compteur");
    const audioEl = document.getElementById("murmureAudio");

    // Effet machine à écrire
    function typeWriterEffect(text, speed = 28) {
      murEl.innerHTML = "";
      let i = 0;

      function step() {
        if (i <= text.length) {
          const partial = text.slice(0, i);
          // Remplacer les sauts de ligne par des <br> pour l’affichage
          murEl.innerHTML = partial
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/\n/g, "<br>");
          i++;
          setTimeout(step, speed);
        }
      }

      step();
    }

    function getBijouIdFromUrl() {
      const url = new URL(window.location.href);
      return url.searchParams.get("id") || "BIJOU001";
    }

    async function chargerMurmure() {
      const id = getBijouIdFromUrl();
      badgeIdEl.textContent = `ID : ${id}`;
      etatEl.textContent = "Le bijou écoute votre présence…";

      try {
        const params = new URLSearchParams({
          id,
          lang: "fr"
        });

        const r = await fetch(`/api/message?${params.toString()}`);
        const data = await r.json();

        const texte = data.text || "Je suis là, silencieux, mais présent pour toi.";
        typeWriterEffect(texte);

        etatEl.textContent = "Murmure du jour généré.";

        // Gestion de l'audio (si présent)
        if (data.audio) {
          audioEl.style.display = "block";
          audioEl.src = data.audio;
          // Si tu veux essayer la lecture automatique, décommente :
          // audioEl.play().catch(() => {});
        } else {
          audioEl.style.display = "none";
          audioEl.src = "";
        }

        // Si tu veux afficher un compteur plus tard (messages restants),
        // on pourra étendre l'API pour renvoyer cette info.
        compteurEl.textContent = "";
      } catch (e) {
        console.error(e);
        etatEl.textContent = "Erreur : impossible de joindre la voix du bijou.";
        typeWriterEffect("Je suis là, silencieux, mais présent pour toi.");
        audioEl.style.display = "none";
        audioEl.src = "";
      }
    }

    window.addEventListener("load", chargerMurmure);
  </script>
</body>
</html>
