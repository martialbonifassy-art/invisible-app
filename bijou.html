<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Murmure du bijou – L’Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Police machine à écrire -->
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #b8833a;
      --accent-soft: #eadcc8;
      --text-main: #2b241c;
      --text-soft: #7f6248;
      --card-bg: rgba(255, 250, 243, 0.96);
      --border-soft: rgba(170, 140, 90, 0.45);
      --shadow-soft: 0 18px 40px rgba(0,0,0,0.20);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Helvetica Neue", Arial, sans-serif;
      background: url("foret-atelier.jpg") center/cover fixed no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 10px;
      color: var(--text-main);
      position: relative;
      overflow: hidden;
    }

    /* voile léger sur la forêt pour la lisibilité */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 20%, rgba(255,255,255,0.45), transparent 55%),
                  radial-gradient(circle at 10% 80%, rgba(255,230,200,0.25), transparent 50%),
                  radial-gradient(circle at 90% 70%, rgba(210,190,160,0.25), transparent 50%),
                  rgba(0,0,0,0.30);
      pointer-events: none;
      z-index: -1;
    }

    .carte {
      max-width: 720px;
      width: 100%;
      background: var(--card-bg);
      border-radius: 28px;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border-soft);
      padding: 22px 22px 26px;
      text-align: center;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    h1 {
      font-size: 0.95rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 6px;
    }

    .sous-titre {
      font-size: 0.9rem;
      color: var(--text-soft);
      margin-bottom: 12px;
    }

    /* switch langue discret en haut à droite de la carte */
    .lang-switch-container {
      position: absolute;
      top: 10px;
      right: 14px;
    }

    .lang-switch {
      display: flex;
      gap: 4px;
      font-size: 0.8rem;
    }

    .lang-switch button {
      border-radius: 999px;
      padding: 4px 9px;
      border: 1px solid var(--accent-soft);
      background: #fff;
      color: var(--text-soft);
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 500;
    }

    .lang-switch button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .badge-id {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 14px;
      background: #f5ebdd;
      border: 1px solid var(--border-soft);
      font-size: 0.82rem;
      margin-bottom: 10px;
    }
    .pastille {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #4caf50;
      box-shadow: 0 0 8px rgba(76,175,80,0.8);
    }

    .etat {
      font-size: 0.86rem;
      color: #82644a;
      margin-bottom: 10px;
    }

    /* Zone du murmure – machine à écrire + lueur */
    .murmure-wrapper {
      position: relative;
      margin: 16px 0 14px;
    }

    .murmure {
      position: relative;
      font-family: "Special Elite", "Courier New", Courier, ui-monospace, monospace;
      font-size: 1.08rem;
      line-height: 1.6;
      letter-spacing: 0.02em;
      color: var(--text-main);
      background: rgba(255,250,243,0.9);
      border-radius: 10px;
      padding: 14px 16px;
      border: 1px solid rgba(0,0,0,0.12);
      box-shadow:
        inset 0 0 6px rgba(0,0,0,0.06),
        0 2px 6px rgba(0,0,0,0.12);
      text-align: left;
      min-height: 4em;
      white-space: pre-wrap;
    }

    /* lueur dorée douce */
    .murmure::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: radial-gradient(circle at 20% 0%, rgba(255, 235, 190, 0.55), transparent 60%);
      mix-blend-mode: soft-light;
      opacity: 0.85;
      pointer-events: none;
      z-index: -1;
    }

    /* Curseur qui clignote façon machine à écrire */
    .murmure::after {
      content: "▌";
      margin-left: 4px;
      animation: blink 0.7s infinite;
      opacity: 1;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* Petits points lumineux flottants */
    .spark {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 223, 150, 0.9);
      box-shadow: 0 0 10px rgba(255, 223, 150, 0.95);
      opacity: 0.0;
