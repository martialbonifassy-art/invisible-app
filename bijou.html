<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Murmure du bijou – L’Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Police machine à écrire -->
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Helvetica Neue", Arial, sans-serif;
      background: url("foret-atelier.jpg") center/cover fixed no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 10px;
      color: #3c2f25;
    }

    .carte {
      max-width: 720px;
      width: 100%;
      background: rgba(255, 250, 243, 0.96);
      border-radius: 28px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.20);
      border: 1px solid rgba(170, 140, 90, 0.45);
      padding: 22px 22px 26px;
      text-align: center;
    }

    h1 {
      font-size: 0.95rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #b8833a;
      margin: 0 0 6px;
    }

    .sous-titre {
      font-size: 0.9rem;
      color: #7f6248;
      margin-bottom: 12px;
    }

    .badge-id {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 14px;
      background: #f5ebdd;
      border: 1px solid rgba(170, 140, 90, 0.45);
      font-size: 0.82rem;
      margin-bottom: 12px;
    }
    .pastille {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #4caf50;
    }

    .etat {
      font-size: 0.86rem;
      color: #82644a;
      margin-bottom: 10px;
    }

    /* STYLE MACHINE À ÉCRIRE + HALO + PARTICULES */
    .murmure {
      position: relative;
      font-family: "Special Elite", "Courier New", Courier, ui-monospace, monospace;
      font-size: 1.15rem;
      line-height: 1.55;
      letter-spacing: 0.02em;
      color: #2b241c;
      background: rgba(255,250,243,0.8);
      border-radius: 6px;
      padding: 14px 16px;
      border: 1px solid rgba(0,0,0,0.12);
      box-shadow:
        inset 0 0 6px rgba(0,0,0,0.05),
        0 2px 4px rgba(0,0,0,0.06);
      text-shadow: 0px 1px rgba(0,0,0,0.08);
      margin: 16px 0 18px;
      min-height: 4em;
      overflow: hidden; /* pour contenir les particules */
    }
    /* Halo lumineux (esprit du bois) */
    .murmure::before {
  content: "";
  position: absolute;
  inset: -40%;
  background:
    radial-gradient(circle at 10% 0%, rgba(255, 236, 200, 0.4), transparent 55%),
    radial-gradient(circle at 90% 90%, rgba(230, 190, 140, 0.55), transparent 55%);
  mix-blend-mode: screen;
  opacity: 0.6;
  pointer-events: none;
  animation: auraPulse 5s ease-in-out infinite;
}
    @keyframes auraPulse {
  0%   { opacity: 0.2; transform: scale(1); }
  25%  { opacity: 0.8; transform: scale(1.04); }
  50%  { opacity: 0.5; transform: scale(1.07); }
  75%  { opacity: 0.9; transform: scale(1.03); }
  100% { opacity: 0.2; transform: scale(1); }
    }
    
    /* Curseur qui clignote façon machine à écrire */
    .murmure::after {
      content: "▌";
      margin-left: 4px;
      animation: blink 0.7s infinite;
      opacity: 1;
      position: relative;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* Petites particules de lumière */
    .murmure-particle {
  position: absolute;
  bottom: -10px;
  width: 7px;
  height: 7px;
  border-radius: 999px;
  background: rgba(255, 230, 180, 0.95);
  box-shadow:
    0 0 8px rgba(255, 215, 150, 0.95),
    0 0 16px rgba(255, 250, 230, 0.9);
  opacity: 0;
  animation: particleFloat 4s linear forwards;

    }

    @keyframes particleFloat {
      0% {
        transform: translate3d(0, 0, 0) scale(0.6);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translate3d(var(--driftX, 0px), -120px, 0) scale(0.9);
        opacity: 0;
      }
    }

    .compteur {
      font-size: 0.82rem;
      color: #7a6450;
      margin-top: 6px;
    }

    .note {
      margin-top: 16px;
      font-size: 0.78rem;
      color: #98816a;
    }

    button {
      border-radius: 999px;
      border: none;
      padding: 9px 18px;
      font-size: 0.9rem;
      cursor: pointer;
      background: #d6a85a;
      color: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.16);
      margin: 4px 4px 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .icone {
      font-size: 1.1rem;
    }
  </style>
</head>

<body>
  <div class="carte">
    <h1>L’ATELIER DES LIENS INVISIBLES</h1>
    <div class="sous-titre">Murmure associé à cet objet en bois.</div>

    <div class="badge-id">
      <span class="pastille"></span>
      <span>Bijou — ID <span id="idBijou">…</span></span>
    </div>

    <div class="etat" id="etat">Connexion au bijou…</div>

    <div class="murmure" id="murmureTexte"><em>Le murmure va apparaître ici…</em></div>

    <div>
      <button id="btnAudio">
        <span class="icone">🔊</span>
        <span id="btnAudioLabel">Écouter le murmure</span>
      </button>
      <button id="btnRelire">
        <span class="icone">✏️</span>Relire le texte
      </button>
    </div>

    <div class="compteur" id="compteur">Murmures restants : —</div>

    <div class="note">
      Chaque ouverture consomme un murmure parmi ceux offerts à ce bijou.
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────
    // Récupération de l’ID dans l’URL
    // ─────────────────────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const bijouId = params.get("id") || "ID BIJOU";

    const idBijouEl = document.getElementById("idBijou");
    const etatEl = document.getElementById("etat");
    const murmureEl = document.getElementById("murmureTexte");
    const compteurEl = document.getElementById("compteur");
    const btnAudio = document.getElementById("btnAudio");
    const btnAudioLabel = document.getElementById("btnAudioLabel");
    const btnRelire = document.getElementById("btnRelire");

    idBijouEl.textContent = bijouId;

    let texteComplet = "";
    let audioObj = null;
    let audioUrl = null;
    let isLoadingAudio = false;
    let isPlaying = false;
    let particlesInterval = null;

    // ─────────────────────────────────────────────────────────────
    // Effet machine à écrire
    // ─────────────────────────────────────────────────────────────
    function typeWriter(text, element, speed = 35) {
      element.textContent = "";
      let i = 0;
      function step() {
        if (i < text.length) {
          element.textContent += text.charAt(i);
          i++;
          setTimeout(step, speed);
        }
      }
      step();
    }

    // ─────────────────────────────────────────────────────────────
    // Particules lumineuses (halo vivant)
    // ─────────────────────────────────────────────────────────────
    function spawnParticle() {
      if (!murmureEl) return;
      const rect = murmureEl.getBoundingClientRect();
      if (!rect.width || !rect.height) return;

      const p = document.createElement("span");
      p.className = "murmure-particle";

      const leftPercent = Math.random() * 100;
      p.style.left = leftPercent + "%";

      const drift = (Math.random() * 40 - 20).toFixed(1) + "px";
      p.style.setProperty("--driftX", drift);

      murmureEl.appendChild(p);

      p.addEventListener("animationend", () => {
        p.remove();
      });
    }

    function startParticles() {
      if (particlesInterval) return;
      particlesInterval = setInterval(spawnParticle, 900);
    }

    // ─────────────────────────────────────────────────────────────
    // Gestion du bouton audio : appelle /api/tts + joue le MP3
    // ─────────────────────────────────────────────────────────────
    async function handleAudioClick() {
      if (!texteComplet) return;
      if (isLoadingAudio) return;

      // Si l'audio existe déjà, on joue / met en pause
      if (audioObj) {
        if (isPlaying) {
          audioObj.pause();
          isPlaying = false;
          btnAudioLabel.textContent = "Écouter le murmure";
        } else {
          audioObj.currentTime = 0;
          audioObj.play();
          isPlaying = true;
          btnAudioLabel.textContent = "Arrêter la voix";
        }
        return;
      }

      // Première demande : appel à /api/tts
      isLoadingAudio = true;
      btnAudio.disabled = true;
      btnAudioLabel.textContent = "Préparation de la voix…";

      try {
        const r = await fetch("/api/tts", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            text: texteComplet,
            voice: "coral", // tu peux tester "nova", "alloy", etc.
          }),
        });

        if (!r.ok) {
          console.error("Erreur TTS:", await r.text());
          alert("Impossible de générer la voix (erreur serveur TTS).");
          btnAudioLabel.textContent = "Voix indisponible";
          return;
        }

        const blob = await r.blob();
        audioUrl = URL.createObjectURL(blob);
        audioObj = new Audio(audioUrl);

        audioObj.onended = () => {
          isPlaying = false;
          btnAudioLabel.textContent = "Écouter le murmure";
        };

        audioObj.play();
        isPlaying = true;
        btnAudioLabel.textContent = "Arrêter la voix";
      } catch (e) {
        console.error(e);
        alert("Erreur de connexion à la voix du bijou.");
        btnAudioLabel.textContent = "Voix indisponible";
      } finally {
        isLoadingAudio = false;
        btnAudio.disabled = false;
      }
    }

    btnAudio.addEventListener("click", handleAudioClick);

    btnRelire.addEventListener("click", () => {
      if (!texteComplet) return;
      typeWriter(texteComplet, murmureEl);
    });

    // ─────────────────────────────────────────────────────────────
    // Chargement du murmure via ton API existante /api/message
    // ─────────────────────────────────────────────────────────────
    async function chargerMurmure() {
      if (!bijouId) {
        etatEl.textContent = "Bijou inconnu.";
        murmureEl.textContent = "";
        return;
      }

      etatEl.textContent = "Murmure en cours de composition…";

      try {
        const r = await fetch(`/api/message?id=${encodeURIComponent(bijouId)}`);
        const data = await r.json();

        if (data.error) {
          etatEl.textContent = "Impossible de joindre la voix de ce bijou.";
          murmureEl.textContent = data.text || "Bijou inconnu.";
          texteComplet = murmureEl.textContent;
          return;
        }

        const texte = data.text || "Le bijou reste silencieux, mais présent.";
        texteComplet = texte;

        etatEl.textContent = "Murmure reçu.";
        typeWriter(texteComplet, murmureEl);

        // On lance les particules au moment où le murmure est vraiment là
        startParticles();

        let remaining = data.remaining ?? data.messages_left ?? data.remainingMessages;
        let total = data.total ?? data.totalMessages ?? data.maxMessages ?? 100;

        if (typeof remaining === "number") {
          compteurEl.textContent = `Murmures restants : ${remaining} / ${total}`;
        } else {
          compteurEl.textContent = "Murmures restants : —";
        }

      } catch (e) {
        console.error(e);
        etatEl.textContent = "Impossible de joindre la voix de ce bijou.";
        murmureEl.textContent = "Bijou inconnu.";
        texteComplet = murmureEl.textContent;
      }
    }

    chargerMurmure();
  </script>
</body>
</html>
