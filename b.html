<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Votre murmure – L’Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-card: rgba(255,250,243,0.98);
      --accent: #b8833a;
      --accent-soft: #eadcc8;
      --text-main: #2e241b;
      --text-soft: #5a4335;
      --border-soft: rgba(170, 140, 90, 0.55);
      --shadow-soft: 0 16px 40px rgba(0,0,0,0.32);
      --radius-xl: 26px;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 12px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("foret-atelier.jpg") center center / cover no-repeat fixed;
      filter: blur(3px) brightness(0.7);
      transform: scale(1.03);
      z-index: -2;
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(246, 236, 220, 0.6);
      z-index: -1;
    }

    .card {
      max-width: 980px;
      width: 100%;
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border-soft);
      padding: 22px 18px;
    }

    .logo-title {
      font-size: 0.95rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .logo-sub {
      font-size: 0.85rem;
      color: var(--text-soft);
      margin-bottom: 14px;
    }

    .subtitle {
      text-align: center;
      font-size: 0.95rem;
      color: var(--text-soft);
      margin-bottom: 8px;
    }

    .public-id {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      background: #f5ebdd;
      border-radius: 999px;
      padding: 7px 14px;
      border: 1px solid var(--border-soft);
      font-size: 0.86rem;
      margin: 8px auto;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #82a738;
    }

    .status {
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-soft);
      margin-bottom: 12px;
    }

    .status.error {
      color: #b03a3a;
    }

    .murmure-box {
      padding: 16px 14px;
      border-radius: 18px;
      background: #fffdf8;
      border: 1px solid #e4d5c3;
      min-height: 140px;
    }

    .murmure {
      font-family: "Special Elite", monospace;
      white-space: pre-wrap;
      font-size: 1rem;
      line-height: 1.6;
    }

    audio {
      width: 100%;
      margin-top: 16px;
    }

    .footnote {
      text-align: center;
      margin-top: 18px;
      font-size: 0.78rem;
      color: var(--text-soft);
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo-title">L’ATELIER DES LIENS INVISIBLES</div>
    <div class="logo-sub">Murmure du bijou relié au bois et à l’IA.</div>

    <div class="subtitle" id="subtitle">Connexion au bijou…</div>

    <div class="public-id" id="publicIdBox" style="display:none;">
      <span class="dot"></span>
      <span id="code">…</span>
    </div>

    <div class="status" id="status">Le bijou s’éveille…</div>

    <div class="murmure-box">
      <div class="murmure" id="murmure"></div>
    </div>

    <audio id="audio" controls style="display:none;"></audio>

    <div class="footnote">
      Ce murmure est unique, né de la configuration de votre bijou.
    </div>
  </div>

  <script>
    const status = document.getElementById("status");
    const murmureBox = document.getElementById("murmure");
    const audioEl = document.getElementById("audio");
    const subtitle = document.getElementById("subtitle");
    const publicIdBox = document.getElementById("publicIdBox");
    const codeEl = document.getElementById("code");

    function typewriter(text) {
      return new Promise(resolve => {
        murmureBox.textContent = "";
        let i = 0;
        function step() {
          murmureBox.textContent = text.slice(0, i);
          if (i < text.length) {
            i++;
            setTimeout(step, 25);
          } else {
            resolve();
          }
        }
        step();
      });
    }

    async function load() {
      const params = new URLSearchParams(window.location.search);
      const publicId = params.get("public_id");

      if (!publicId) {
        status.textContent = "Aucun code détecté.";
        status.classList.add("error");
        return;
      }

      publicIdBox.style.display = "inline-flex";
      codeEl.textContent = "Code bijou : " + publicId;

      const resp = await fetch(`/api/publicMessage?public_id=${publicId}`);
      const data = await resp.json();

      if (!data.ok) {
        status.classList.add("error");
        status.textContent = data.message || "Impossible de joindre le bijou.";
        return;
      }

      subtitle.textContent = data.langue === "en" ? "Whisper incoming…" : "Murmure en cours…";
      status.textContent = "";

      await typewriter(data.text || "");

      if (data.audio) {
        audioEl.src = data.audio;
        audioEl.style.display = "block";
      }
    }

    load();
  </script>
</body>
</html>
