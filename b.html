<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Murmure du bijou – L’Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg-card: rgba(255,250,243,0.98);
      --accent: #b8833a;
      --text-main: #2e241b;
      --text-soft: #5a4335;
      --border-soft: rgba(170, 140, 90, 0.55);
      --shadow-soft: 0 14px 34px rgba(0,0,0,0.28);
      --radius-xl: 26px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 12px;
      background: #f6eee2;
      color: var(--text-main);
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("foret-atelier.jpg") center center/cover no-repeat fixed;
      filter: blur(3px) brightness(0.7);
      transform: scale(1.03);
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(246, 236, 220, 0.6);
      z-index: -1;
    }

    .card {
      max-width: 760px;
      width: 100%;
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border-soft);
      box-shadow: var(--shadow-soft);
      padding: 22px 20px 20px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .logo-title {
      font-size: 0.9rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    h1 {
      font-size: 1.4rem;
      margin: 4px 0 10px;
      color: #231a13;
    }

    .status {
      font-size: 0.96rem;
      color: var(--text-soft);
      margin-bottom: 10px;
    }

    .small {
      font-size: 0.82rem;
      color: #7b6046;
    }

    .error {
      color: #b03a3a;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-title">L’ATELIER DES LIENS INVISIBLES</div>
    <h1 id="title">Connexion au bijou en cours…</h1>
    <p id="status" class="status">
      Le bijou se connecte à son murmure. Un instant…
    </p>
    <p id="extra" class="small">
      Si rien ne se passe au bout de quelques secondes, vous pouvez réessayer
      ou contacter l’Atelier.
    </p>
  </div>

  <script>
    (function () {
      const url = new URL(window.location.href);
      const publicId = url.searchParams.get("public_id");
      const lang = url.searchParams.get("lang") === "en" ? "en" : "fr";

      const titleEl = document.getElementById("title");
      const statusEl = document.getElementById("status");
      const extraEl = document.getElementById("extra");

      function setTextsConnecting() {
        if (lang === "en") {
          titleEl.textContent = "Connecting to the jewel…";
          statusEl.textContent = "The jewel is connecting to its whisper. Just a moment…";
          extraEl.textContent =
            "If nothing happens after a few seconds, you can try again or contact the Atelier.";
        } else {
          titleEl.textContent = "Connexion au bijou en cours…";
          statusEl.textContent = "Le bijou se connecte à son murmure. Un instant…";
          extraEl.textContent =
            "Si rien ne se passe au bout de quelques secondes, vous pouvez réessayer ou contacter l’Atelier.";
        }
      }

      function setTextsError(messageFr, messageEn) {
        if (lang === "en") {
          titleEl.textContent = "Jewel unreachable";
          statusEl.textContent = messageEn;
        } else {
          titleEl.textContent = "Bijou inaccessible";
          statusEl.textContent = messageFr;
        }
        statusEl.classList.add("error");
      }

      if (!publicId) {
        setTextsError(
          "Code bijou manquant dans le lien.",
          "Missing jewel code in the link."
        );
        return;
      }

      setTextsConnecting();

      (async () => {
        try {
          // IMPORTANT : on utilise le paramètre "code" pour /api/getBijou
          const params = new URLSearchParams({ code: publicId });
          const resp = await fetch(`/api/getBijou?${params.toString()}`);
          const data = await resp.json();

          if (!data || !data.ok || !data.bijou) {
            setTextsError(
              "Ce bijou n’a pas pu être retrouvé. Vérifiez le code ou contactez l’Atelier.",
              "This jewel could not be found. Please check the code or contact the Atelier."
            );
            return;
          }

          const bijou = data.bijou;
          const internalId = bijou.id;

          // Bijou pas encore paramétré ?
          const needsSetup =
            !bijou.theme &&
            !bijou.sous_theme &&
            !bijou.prenom &&
            !bijou.intention &&
            !bijou.detail;

          if (needsSetup) {
            const personalizePath =
              `/personnalisation${lang === "en" ? "-en" : ""}.html`;
            const personalizeUrl =
              `${personalizePath}?id=${encodeURIComponent(
                internalId
              )}&code=${encodeURIComponent(publicId)}&lang=${lang}`;

            window.location.href = personalizeUrl;
            return;
          }

          // Sinon, on envoie vers la page d’écoute
          const listenUrl =
            `/bijou.html?id=${encodeURIComponent(internalId)}&lang=${lang}`;
          window.location.href = listenUrl;
        } catch (e) {
          console.error(e);
          setTextsError(
            "Erreur de connexion au bijou. Merci de réessayer un peu plus tard.",
            "Connection error with the jewel. Please try again later."
          );
        }
      })();
    })();
  </script>
</body>
</html>
