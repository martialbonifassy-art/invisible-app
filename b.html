<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Murmure du bijou – L’Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Police machine à écrire -->
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #b8833a;
      --accent-soft: #eadcc8;
      --text-main: #2b241c;
      --text-soft: #7f6248;
      --card-bg: rgba(255, 250, 243, 0.96);
      --border-soft: rgba(170, 140, 90, 0.45);
      --shadow-soft: 0 18px 40px rgba(0,0,0,0.20);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Helvetica Neue", Arial, sans-serif;
      background: url("foret-atelier.jpg") center/cover fixed no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 10px;
      color: var(--text-main);
      position: relative;
      overflow: hidden;
    }

    /* voile forêt comme bijou.html */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 20%, rgba(255,255,255,0.45), transparent 55%),
                  radial-gradient(circle at 10% 80%, rgba(255,230,200,0.25), transparent 50%),
                  radial-gradient(circle at 90% 70%, rgba(210,190,160,0.25), transparent 50%),
                  rgba(0,0,0,0.30);
      pointer-events: none;
      z-index: -1;
    }

    .carte {
      max-width: 720px;
      width: 100%;
      background: var(--card-bg);
      border-radius: 28px;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border-soft);
      padding: 22px 22px 26px;
      text-align: center;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    h1 {
      font-size: 0.95rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 6px;
    }

    .sous-titre {
      font-size: 0.9rem;
      color: var(--text-soft);
      margin-bottom: 4px;
    }

    .ref-public {
      font-size: 0.78rem;
      color: #9a7a58;
      margin-bottom: 12px;
      opacity: 0.9;
    }

    .badge-id {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 14px;
      background: #f5ebdd;
      border: 1px solid var(--border-soft);
      font-size: 0.82rem;
      margin-bottom: 10px;
    }

    .pastille {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #4caf50;
      box-shadow: 0 0 8px rgba(76,175,80,0.8);
    }

    .etat {
      font-size: 0.86rem;
      color: #82644a;
      margin-bottom: 10px;
    }

    .murmure-wrapper {
      position: relative;
      margin: 16px 0 14px;
    }

    .murmure {
      position: relative;
      font-family: "Special Elite", "Courier New", Courier, ui-monospace, monospace;
      font-size: 1.08rem;
      line-height: 1.6;
      letter-spacing: 0.02em;
      color: var(--text-main);
      background: rgba(255,250,243,0.9);
      border-radius: 10px;
      padding: 14px 16px;
      border: 1px solid rgba(0,0,0,0.12);
      box-shadow:
        inset 0 0 6px rgba(0,0,0,0.06),
        0 2px 6px rgba(0,0,0,0.12);
      text-align: left;
      min-height: 4em;
      white-space: pre-wrap;
    }

    .murmure::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: radial-gradient(circle at 20% 0%, rgba(255, 235, 190, 0.55), transparent 60%);
      mix-blend-mode: soft-light;
      opacity: 0.85;
      pointer-events: none;
      z-index: -1;
    }

    .murmure::after {
      content: "▌";
      margin-left: 4px;
      animation: blink 0.7s infinite;
      opacity: 1;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    .spark {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 223, 150, 0.9);
      box-shadow: 0 0 10px rgba(255, 223, 150, 0.95);
      opacity: 0.0;
      animation: floatSpark 6s linear infinite;
      pointer-events: none;
    }

    .spark:nth-child(1) { top: 12%; left: 16%; animation-delay: 0s; }
    .spark:nth-child(2) { top: 20%; right: 12%; animation-delay: 1.2s; }
    .spark:nth-child(3) { bottom: 18%; left: 26%; animation-delay: 2.4s; }
    .spark:nth-child(4) { bottom: 10%; right: 22%; animation-delay: 3.6s; }

    @keyframes floatSpark {
      0%   { transform: translateY(6px); opacity: 0; }
      10%  { opacity: 0.9; }
      60%  { opacity: 0.7; }
      100% { transform: translateY(-10px); opacity: 0; }
    }

    .compteur {
      font-size: 0.82rem;
      color: #7a6450;
      margin-top: 6px;
    }

    .note {
      font-size: 0.78rem;
      color: #a1896a;
      margin-top: 10px;
    }

    .note a {
      color: #8b6425;
      text-decoration: none;
    }

    .note a:hover { text-decoration: underline; }

    audio {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="carte">
    <h1 id="titleMain">L’ATELIER DES LIENS INVISIBLES</h1>
    <div class="sous-titre" id="subtitle">
      Murmure du bijou relié au bois et à l’IA.
    </div>
    <div class="ref-public" id="refPublic"></div>

    <div class="badge-id">
      <span class="pastille"></span>
      <span id="badgeState">Connexion au bijou…</span>
    </div>

    <div class="etat" id="etat">Le bijou se réveille…</div>

    <div class="murmure-wrapper">
      <div class="spark"></div>
      <div class="spark"></div>
      <div class="spark"></div>
      <div class="spark"></div>

      <div class="murmure" id="murmure">
        Le murmure va apparaître ici…
      </div>
    </div>

    <audio id="murmureAudio" controls style="margin-top:12px; width:100%; display:none;">
      Votre navigateur ne supporte pas la lecture audio.
    </audio>

    <div class="compteur" id="compteur"></div>

    <div class="note" id="noteText">
      Ce murmure est unique, généré à partir des paramètres choisis lors de la création du bijou.
      <br />
      Si quelque chose vous semble anormal, contactez l’atelier.
    </div>
  </div>

  <script>
    const murEl = document.getElementById("murmure");
    const etatEl = document.getElementById("etat");
    const badgeStateEl = document.getElementById("badgeState");
    const compteurEl = document.getElementById("compteur");
    const audioEl = document.getElementById("murmureAudio");
    const refPublicEl = document.getElementById("refPublic");
    const titleMainEl = document.getElementById("titleMain");
    const subtitleEl = document.getElementById("subtitle");
    const noteTextEl = document.getElementById("noteText");

    const UI_FR = {
      title: "L’ATELIER DES LIENS INVISIBLES",
      subtitle: "Murmure du bijou relié au bois et à l’IA.",
      refPrefix: "Référence publique : ",
      badgeConnecting: "Connexion au bijou…",
      waking: "Le bijou se réveille…",
      listening: "Le bijou écoute votre présence…",
      generated: "Murmure du jour généré.",
      errorState: "Erreur : impossible de joindre la voix du bijou.",
      fallbackText: "Je suis là, silencieux, mais présent pour toi.",
      note: "Ce murmure est unique, généré à partir des paramètres choisis lors de la création du bijou.\nSi quelque chose vous semble anormal, contactez l’atelier."
    };

    const UI_EN = {
      title: "L’ATELIER DES LIENS INVISIBLES",
      subtitle: "Whisper from the jewel, linked to wood and AI.",
      refPrefix: "Public reference: ",
      badgeConnecting: "Connecting to the jewel…",
      waking: "The jewel is waking up…",
      listening: "The jewel is listening to your presence…",
      generated: "Whisper of the day generated.",
      errorState: "Error: unable to reach the jewel’s voice.",
      fallbackText: "I am here, silent, but still by your side.",
      note: "This whisper is unique, generated from the parameters chosen when the jewel was created.\nIf something seems wrong, please contact the workshop."
    };

    function pickUI(lang) {
      const isFR = (lang || "fr").toLowerCase().startsWith("fr");
      return isFR ? UI_FR : UI_EN;
    }

    function applyUIStrings(lang, publicId) {
      const ui = pickUI(lang);
      titleMainEl.textContent = ui.title;
      subtitleEl.textContent = ui.subtitle;
      refPublicEl.textContent = ui.refPrefix + (publicId || "—");
      badgeStateEl.textContent = ui.badgeConnecting;
      etatEl.textContent = ui.waking;
      noteTextEl.innerHTML = ui.note.replace(/\n/g, "<br />");
    }

    function setStateText(type, lang) {
      const ui = pickUI(lang);
      if (type === "listening") etatEl.textContent = ui.listening;
      if (type === "generated") etatEl.textContent = ui.generated;
      if (type === "error") etatEl.textContent = ui.errorState;
    }

    function getFallbackText(lang) {
      return pickUI(lang).fallbackText;
    }

    function typeWriterEffect(text, speed = 28) {
      murEl.innerHTML = "";
      let i = 0;

      function step() {
        if (i <= text.length) {
          const partial = text.slice(0, i);
          murEl.innerHTML = partial
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/\n/g, "<br>");
          i++;
          setTimeout(step, speed);
        }
      }

      step();
    }

    function getPublicIdFromUrl() {
      const url = new URL(window.location.href);

      // 1) ?public_id=XXX (nouveau format)
      const fromPublic = url.searchParams.get("public_id");
      if (fromPublic) return fromPublic;

      // 2) Compatibilité avec tes anciens liens : ?code=XXX ou ?c=XXX
      const fromLegacy = url.searchParams.get("code") || url.searchParams.get("c");
      if (fromLegacy) return fromLegacy;

      // 3) Mode /b/ABC123 (via vercel.json)
      const parts = window.location.pathname.split("/").filter(Boolean);
      if (parts.length >= 2 && parts[0] === "b") {
        return parts[1];
      }

      return null;
    }

    async function chargerMurmurePublic() {
      const publicId = getPublicIdFromUrl();

      // Avant la réponse API on part sur FR par défaut
      applyUIStrings("fr", publicId || "—");

      if (!publicId) {
        setStateText("error", "fr");
        typeWriterEffect("Impossible d’identifier ce bijou. Le lien est peut-être incomplet.");
        audioEl.style.display = "none";
        audioEl.src = "";
        return;
      }

      setStateText("listening", "fr");

      try {
        const params = new URLSearchParams({ public_id: publicId });
        const r = await fetch(`/api/publicMessage?${params.toString()}`);

        if (!r.ok) {
          throw new Error("HTTP " + r.status);
        }

        const data = await r.json();
        const lang = data.lang || "fr";

        applyUIStrings(lang, publicId);

        const texte = data.text || getFallbackText(lang);
        typeWriterEffect(texte);
        setStateText("generated", lang);

        if (data.audio) {
          audioEl.style.display = "block";
          audioEl.src = data.audio;
        } else {
          audioEl.style.display = "none";
          audioEl.src = "";
        }

        if (typeof data.messages_restants === "number" && typeof data.messages_max === "number") {
          const isFR = (lang || "fr").toLowerCase().startsWith("fr");
          compteurEl.textContent = isFR
            ? `${data.messages_restants}/${data.messages_max} murmures restants`
            : `${data.messages_restants}/${data.messages_max} whispers remaining`;
        } else {
          compteurEl.textContent = "";
        }

      } catch (e) {
        console.error(e);
        setStateText("error", "fr");
        typeWriterEffect(getFallbackText("fr"));
        audioEl.style.display = "none";
        audioEl.src = "";
      }
    }

    window.addEventListener("load", chargerMurmurePublic);
  </script>
</body>
</html>
