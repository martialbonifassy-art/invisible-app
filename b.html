<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Murmure du bijou – L’Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Police machine à écrire -->
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #b8833a;
      --accent-soft: #eadcc8;
      --text-main: #2b241c;
      --text-soft: #7f6248;
      --card-bg: rgba(255, 250, 243, 0.96);
      --border-soft: rgba(170, 140, 90, 0.45);
      --shadow-soft: 0 18px 40px rgba(0,0,0,0.20);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Helvetica Neue", Arial, sans-serif;
      background: url("foret-atelier.jpg") center/cover fixed no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 10px;
      color: var(--text-main);
      position: relative;
      overflow: hidden;
    }

    /* voile léger sur la forêt pour la lisibilité */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,0.45), transparent 55%),
        radial-gradient(circle at 10% 80%, rgba(255,230,200,0.25), transparent 50%),
        radial-gradient(circle at 90% 70%, rgba(210,190,160,0.25), transparent 50%),
        rgba(0,0,0,0.30);
      pointer-events: none;
      z-index: -1;
    }

    .carte {
      max-width: 980px;
      width: 100%;
      background: var(--card-bg);
      border-radius: 28px;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border-soft);
      padding: 24px 22px 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    h1 {
      font-size: 1.05rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 8px;
    }

    .sous-titre {
      font-size: 0.9rem;
      color: var(--text-soft);
      margin-bottom: 6px;
    }

    .ref-publique {
      font-size: 0.86rem;
      color: var(--text-soft);
      margin-bottom: 16px;
    }

    .ref-publique strong {
      letter-spacing: 0.08em;
    }

    .bouton-connexion {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 10px 20px;
      background: #f5ebdd;
      border: 1px solid var(--border-soft);
      font-size: 0.9rem;
      color: var(--text-main);
      margin-bottom: 12px;
    }

    .bouton-connexion-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #82c25b;
      box-shadow: 0 0 8px rgba(130,194,91,0.9);
    }

    .etat-connexion {
      font-size: 0.86rem;
      color: var(--text-soft);
      margin-bottom: 8px;
    }

    .etat-texte {
      font-size: 0.86rem;
      color: #a15a4a;
      margin-bottom: 12px;
    }

    .etat-texte.error {
      color: #b03a3a;
    }

    /* Zone du murmure – machine à écrire + lueur */
    .murmure-wrapper {
      position: relative;
      margin: 18px 0 12px;
    }

    .murmure {
      position: relative;
      font-family: "Special Elite", "Courier New", Courier, ui-monospace, monospace;
      font-size: 1.1rem;
      line-height: 1.6;
      letter-spacing: 0.03em;
      color: var(--text-main);
      background: rgba(255,250,243,0.9);
      border-radius: 12px;
      padding: 16px 20px;
      border: 1px solid rgba(0,0,0,0.12);
      box-shadow:
        inset 0 0 6px rgba(0,0,0,0.06),
        0 2px 6px rgba(0,0,0,0.12);
      text-align: left;
      min-height: 4em;
      white-space: pre-wrap;
    }

    .murmure::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background:
        radial-gradient(circle at 10% 0%, rgba(255, 235, 190, 0.55), transparent 60%);
      mix-blend-mode: soft-light;
      opacity: 0.9;
      pointer-events: none;
      z-index: -1;
    }

    .murmure::after {
      content: "▌";
      margin-left: 4px;
      animation: blink 0.7s infinite;
      opacity: 1;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* Petits points lumineux flottants */
    .spark {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 223, 150, 0.9);
      box-shadow: 0 0 10px rgba(255, 223, 150, 0.95);
      opacity: 0.0;
      animation: floatSpark 6s linear infinite;
      pointer-events: none;
    }

    .spark:nth-child(1) { top: 8%; left: 12%; animation-delay: 0s; }
    .spark:nth-child(2) { top: 12%; right: 10%; animation-delay: 1.5s; }
    .spark:nth-child(3) { bottom: 16%; left: 22%; animation-delay: 3s; }
    .spark:nth-child(4) { bottom: 10%; right: 20%; animation-delay: 4.5s; }

    @keyframes floatSpark {
      0%   { transform: translateY(6px); opacity: 0; }
      10%  { opacity: 0.9; }
      60%  { opacity: 0.7; }
      100% { transform: translateY(-10px); opacity: 0; }
    }

    audio {
      margin-top: 12px;
      width: 100%;
      display: none;
    }

    .compteur {
      font-size: 0.82rem;
      color: #7a6450;
      margin-top: 8px;
    }

    .note {
      font-size: 0.8rem;
      color: #a18967;
      margin-top: 18px;
      line-height: 1.5;
    }

    .note strong {
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="carte">
    <h1>L’ATELIER DES LIENS INVISIBLES</h1>
    <div class="sous-titre">Murmure du bijou relié au bois et à l’IA.</div>
    <div class="ref-publique">
      Référence publique : <strong id="refPublique">—</strong>
    </div>

    <div class="bouton-connexion">
      <span class="bouton-connexion-dot"></span>
      <span id="etatConnexion">Connexion au bijou…</span>
    </div>

    <div class="etat-texte" id="etatTexte"></div>

    <div class="murmure-wrapper">
      <div class="spark"></div>
      <div class="spark"></div>
      <div class="spark"></div>
      <div class="spark"></div>

      <div class="murmure" id="murmure">
        Le murmure va apparaître ici…
      </div>
    </div>

    <audio id="murmureAudio" controls>
      Votre navigateur ne supporte pas la lecture audio.
    </audio>

    <div class="compteur" id="compteur"></div>

    <div class="note">
      Ce murmure est unique, généré à partir des paramètres choisis lors de la création du bijou.
      <br />
      Si quelque chose vous semble anormal, contactez l’atelier.
    </div>
  </div>

  <script>
    const refPubliqueEl = document.getElementById("refPublique");
    const etatConnexionEl = document.getElementById("etatConnexion");
    const etatTexteEl = document.getElementById("etatTexte");
    const murEl = document.getElementById("murmure");
    const audioEl = document.getElementById("murmureAudio");
    const compteurEl = document.getElementById("compteur");

    // Effet machine à écrire
    function typeWriterEffect(text, speed = 28) {
      murEl.innerHTML = "";
      let i = 0;

      function step() {
        if (i <= text.length) {
          const partial = text.slice(0, i);
          murEl.innerHTML = partial
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/\n/g, "<br>");
          i++;
          setTimeout(step, speed);
        }
      }

      step();
    }

    function getPublicIdFromUrl() {
      const url = new URL(window.location.href);

      // 1) ?public_id=... (principal)
      const fromQuery =
        url.searchParams.get("public_id") ||
        url.searchParams.get("code") ||
        url.searchParams.get("c");
      if (fromQuery) return fromQuery;

      // 2) Mode /b/ABC123
      const parts = window.location.pathname.split("/").filter(Boolean);
      if (parts.length >= 2 && parts[0] === "b") {
        return parts[1];
      }

      return null;
    }

    async function chargerMurmurePublic() {
      const publicId = getPublicIdFromUrl();

      if (!publicId) {
        refPubliqueEl.textContent = "—";
        etatConnexionEl.textContent = "Aucune référence de bijou trouvée.";
        etatTexteEl.classList.add("error");
        etatTexteEl.textContent =
          "Le lien ne contient pas de code de bijou valide.";
        typeWriterEffect("Je suis là, silencieux, mais présent pour toi.");
        return;
      }

      refPubliqueEl.textContent = publicId;
      etatConnexionEl.textContent = "Connexion au bijou…";
      etatTexteEl.classList.remove("error");
      etatTexteEl.textContent = "";

      try {
        const params = new URLSearchParams({ public_id: publicId });
        const r = await fetch(`/api/publicMessage?${params.toString()}`);

        if (!r.ok) {
          throw new Error("HTTP " + r.status);
        }

        const data = await r.json();

        const texte =
          data.text ||
          "Je suis là, silencieux, mais présent pour toi.";

        typeWriterEffect(texte);

        etatConnexionEl.textContent = "Connexion au bijou réussie.";
        etatTexteEl.textContent = "Murmure généré à partir de ce bijou.";

        // Audio
        if (data.audio) {
          audioEl.style.display = "block";
          audioEl.src = data.audio;
        } else {
          audioEl.style.display = "none";
          audioEl.src = "";
        }

        // Compteur de murmures
        if (typeof data.messages_restants === "number" && data.messages_max != null) {
          compteurEl.textContent =
            `Il reste ${data.messages_restants} murmure(s) sur ${data.messages_max}.`;
        } else {
          compteurEl.textContent = "";
        }
      } catch (e) {
        console.error(e);
        etatConnexionEl.textContent = "Connexion au bijou…";
        etatTexteEl.classList.add("error");
        etatTexteEl.textContent =
          "Erreur : impossible de joindre la voix du bijou.";
        audioEl.style.display = "none";
        audioEl.src = "";
        typeWriterEffect("Je suis là, silencieux, mais présent pour toi.");
        compteurEl.textContent = "";
      }
    }

    window.addEventListener("load", chargerMurmurePublic);
  </script>
</body>
</html>
