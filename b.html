<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Votre bijou – L’Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* Switch FR / EN global */
.lang-switch {
  display: inline-flex;
  background: #f7ecdd;
  border-radius: 999px;
  padding: 3px;
  border: 1px solid rgba(170, 140, 90, 0.45);
  gap: 3px;
  align-items: center;
}

.lang-btn {
  border-radius: 999px;
  border: none;
  padding: 4px 10px;
  font-size: 0.78rem;
  cursor: pointer;
  background: transparent;
  color: #5a4335; /* tu peux ajuster */
}

.lang-btn.active {
  background: #b8833a;
  color: #fff;
  font-weight: 600;
}

    :root {
      --bg-card: rgba(255,250,243,0.98);
      --accent: #b8833a;
      --accent-soft: #eadcc8;
      --text-main: #2e241b;
      --text-soft: #5a4335;
      --border-soft: rgba(170, 140, 90, 0.55);
      --shadow-soft: 0 16px 40px rgba(0,0,0,0.32);
      --radius-xl: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Helvetica Neue", Arial, sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 12px;
      position: relative;
      overflow-x: hidden;
    }

    /* Fond forêt, comme l'index */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("foret-atelier.jpg") center center / cover no-repeat fixed;
      filter: blur(3px) brightness(0.7);
      transform: scale(1.03);
      z-index: -2;
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(246, 236, 220, 0.6);
      z-index: -1;
    }

    .card {
      max-width: 720px;
      width: 100%;
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border-soft);
      padding: 20px 18px 22px;
      backdrop-filter: blur(10px);
      position: relative;
    }

    h1 {
      font-size: 1.05rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--accent);
      margin: 0 0 6px;
    }

    .sub {
      font-size: 0.9rem;
      color: var(--text-soft);
      margin-bottom: 10px;
    }

    /* Switch langue */
    .lang-switch {
      position: absolute;
      top: 16px;
      right: 18px;
      display: inline-flex;
      background: #f7ecdd;
      border-radius: 999px;
      padding: 3px;
      border: 1px solid rgba(170, 140, 90, 0.45);
      gap: 3px;
    }

    .lang-btn {
      border-radius: 999px;
      border: none;
      padding: 4px 10px;
      font-size: 0.78rem;
      cursor: pointer;
      background: transparent;
      color: var(--text-soft);
    }

    .lang-btn.active {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .badge-code {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 12px;
      background: #f5ebdd;
      border: 1px solid var(--border-soft);
      font-size: 0.82rem;
      margin-bottom: 10px;
    }
    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #82a738;
    }

    .status {
      font-size: 0.86rem;
      color: var(--text-soft);
      margin-bottom: 12px;
    }

    .bloc {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 16px;
      background: #fffdf8;
      border: 1px solid #e4d5c3;
      font-size: 0.9rem;
    }

    .bloc-title {
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-soft);
      margin-bottom: 4px;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    @media (min-width: 640px) {
      .actions { flex-direction: row; }
      .actions a, .actions button { flex: 1; }
    }

    a.btn, button.btn {
      border-radius: 999px;
      border: none;
      padding: 10px 16px;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-weight: 500;
    }

    .btn-main {
      background: #d39633;
      color: #fff;
      box-shadow: 0 10px 20px rgba(0,0,0,0.25);
      border: 1px solid #a86b1e;
    }
    .btn-main:hover {
      background: #b67622;
    }

    .btn-ghost {
      background: #fff;
      color: var(--accent);
      border: 1px solid var(--accent-soft);
    }
    .btn-ghost:hover {
      background: var(--accent-soft);
      color: #4a321e;
    }

    .info {
      margin-top: 10px;
      font-size: 0.8rem;
      color: var(--text-soft);
    }

    .error {
      color: #b03a3a;
    }

    .loading {
      opacity: 0.8;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="lang-switch">
      <button type="button" class="lang-btn" id="langFr">FR</button>
      <button type="button" class="lang-btn" id="langEn">EN</button>
    </div>

    <h1>L’ATELIER DES LIENS INVISIBLES</h1>
    <div class="sub" id="subtitle">
      Vérification de votre bijou en cours…
    </div>

    <div id="codeZone" class="badge-code" style="display:none;">
      <div class="badge-dot"></div>
      <span id="codeLabel"></span>
    </div>

    <div id="status" class="status loading">
      Lecture du murmure en préparation…
    </div>

    <div id="content"></div>

    <div class="info" id="info"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://mchqysvhgnlixyjeserv.supabase.co";
    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jaHF5c3ZoZ25saXh5amVzZXJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM4NDE2OTYsImV4cCI6MjA3OTQxNzY5Nn0.vNE1iDPQeMls7RTqfFNS8Yxdlx_J2Jb9MgK4wcBtjWE";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const subtitle = document.getElementById("subtitle");
    const codeZone = document.getElementById("codeZone");
    const codeLabel = document.getElementById("codeLabel");
    const statusEl = document.getElementById("status");
    const contentEl = document.getElementById("content");
    const infoEl = document.getElementById("info");

    const btnFr = document.getElementById("langFr");
    const btnEn = document.getElementById("langEn");

    let UI_LANG = "fr"; // fr | en

    function getPublicIdFromUrl() {
      const url = new URL(window.location.href);

      // 1) Paramètre ?code=XXX ou ?c=XXX ou ?public_id=XXX
      const fromQuery =
        url.searchParams.get("code") ||
        url.searchParams.get("c") ||
        url.searchParams.get("public_id");
      if (fromQuery) return fromQuery;

      // 2) Mode /b/ABC123 grâce à vercel.json (on prend le dernier segment)
      const parts = window.location.pathname.split("/").filter(Boolean);
      if (parts.length >= 2 && parts[0] === "b") {
        return parts[1];
      }

      return null;
    }

    function getLangParamFromUrl() {
      const url = new URL(window.location.href);
      const lang = (url.searchParams.get("lang") || "").toLowerCase();
      if (lang === "fr" || lang === "en") return lang;
      return null;
    }

    function detectUiLang(bijouLang) {
      // 1) Paramètre explicite ?lang=
      const paramLang = getLangParamFromUrl();
      if (paramLang) return paramLang;

      // 2) Langue du bijou en base
      const fromDb = (bijouLang || "").toLowerCase();
      if (fromDb === "fr" || fromDb === "en") return fromDb;

      // 3) Langue du navigateur
      const navLang = (navigator.language || navigator.userLanguage || "fr").toLowerCase();
      if (navLang.startsWith("en")) return "en";

      return "fr";
    }

    function updateLangSwitchUi() {
      if (UI_LANG === "en") {
        btnEn.classList.add("active");
        btnFr.classList.remove("active");
        document.documentElement.lang = "en";
      } else {
        btnFr.classList.add("active");
        btnEn.classList.remove("active");
        document.documentElement.lang = "fr";
      }
    }

    function setLangAndReload(lang) {
      const url = new URL(window.location.href);
      url.searchParams.set("lang", lang);
      window.location.href = url.toString();
    }

    btnFr.addEventListener("click", () => setLangAndReload("fr"));
    btnEn.addEventListener("click", () => setLangAndReload("en"));

    async function main() {
      const publicId = getPublicIdFromUrl();

      if (!publicId) {
        UI_LANG = detectUiLang(null);
        updateLangSwitchUi();

        subtitle.textContent =
          UI_LANG === "en" ? "Jewel not found" : "Bijou introuvable";
        statusEl.classList.remove("loading");
        statusEl.classList.add("error");
        statusEl.textContent =
          UI_LANG === "en"
            ? "No jewel code was detected in this link."
            : "Aucun code de bijou n’a été détecté dans ce lien.";
        infoEl.textContent =
          UI_LANG === "en"
            ? "Check the QR code or NFC tag, or contact the Atelier."
            : "Vérifiez le QR code ou la puce NFC, ou contactez l’atelier.";
        return;
      }

      codeZone.style.display = "inline-flex";
      codeLabel.textContent = "Code bijou : " + publicId;

      // Texte provisoire FR, on corrigera selon la langue après
      subtitle.textContent = "Connexion au bijou en cours…";
      statusEl.textContent = "Lecture du murmure en préparation…";

      const { data: bijou, error } = await supabase
        .from("bijoux")
        .select(`
          id,
          public_id,
          etat,
          langue,
          prenom,
          theme,
          sous_theme,
          messages_restants,
          messages_max
        `)
        .eq("public_id", publicId)
        .maybeSingle();

      statusEl.classList.remove("loading");

      if (error) {
        console.error(error);
        UI_LANG = detectUiLang(null);
        updateLangSwitchUi();

        subtitle.textContent =
          UI_LANG === "en"
            ? "Unable to read this jewel."
            : "Impossible de lire les informations du bijou.";
        statusEl.classList.add("error");
        statusEl.textContent =
          UI_LANG === "en"
            ? "An error occurred. Please try again later."
            : "Une erreur est survenue. Merci de réessayer plus tard.";
        infoEl.textContent =
          UI_LANG === "en"
            ? "If the problem persists, please contact the Atelier des Liens Invisibles."
            : "Si le problème persiste, contactez l’Atelier des Liens Invisibles.";
        return;
      }

      if (!bijou) {
        UI_LANG = detectUiLang(null);
        updateLangSwitchUi();

        subtitle.textContent =
          UI_LANG === "en" ? "Jewel not recognized" : "Bijou non reconnu";
        statusEl.classList.add("error");
        statusEl.textContent =
          UI_LANG === "en"
            ? "This code does not match any jewel registered in the Atelier."
            : "Ce code ne correspond à aucun bijou enregistré dans l’atelier.";
        infoEl.textContent =
          UI_LANG === "en"
            ? "Make sure the tag or QR code really comes from the Atelier des Liens Invisibles."
            : "Vérifiez que la puce ou le QR code vous a bien été remis par l’Atelier des Liens Invisibles.";
        return;
      }

      // Déterminer la langue d’interface (UI_LANG)
      UI_LANG = detectUiLang(bijou.langue);
      const isEn = UI_LANG === "en";
      updateLangSwitchUi();

      // Texte de statut
      const nom =
        bijou.prenom ||
        (isEn
          ? "the person who will receive this jewel"
          : "la personne qui recevra ce bijou");

      const isConfigured =
        bijou.etat === "configure" && bijou.prenom && bijou.theme && bijou.sous_theme;

      if (!isConfigured) {
        subtitle.textContent = isEn
          ? "Your jewel is ready to be personalized."
          : "Votre bijou est prêt à être personnalisé.";

        statusEl.textContent = isEn
          ? "This jewel has been created at the workshop, but its whisper has not yet been written."
          : "Ce bijou a été créé à l’atelier, mais son murmure n’a pas encore été écrit.";

        renderConfigurationInvite(bijou, isEn);
      } else {
        subtitle.textContent = isEn
          ? "Your jewel is active."
          : "Votre bijou est actif.";

        const restants = bijou.messages_restants;
        const max = bijou.messages_max;

        statusEl.textContent = isEn
          ? `This jewel is linked to ${nom}. There are ${
              restants != null ? restants : "?"
            } whispers left out of ${max || "?"}.`
          : `Ce bijou est relié à ${nom}. Il reste ${
              restants != null ? restants : "?"
            } murmure(s) sur ${max || "?"}.`;

        renderActiveActions(bijou, isEn);
      }
    }

    function renderConfigurationInvite(bijou, isEn) {
      const id = bijou.id;
      const persoPage = isEn ? "/personnalisation-en.html" : "/personnalisation.html";
      const indexPage = isEn ? "/index-en.html" : "/index.html";
      const urlPersonnalisation = `${persoPage}?id=${encodeURIComponent(id)}`;

      const themeText = bijou.theme || (isEn ? "not defined yet" : "non défini");
      const preText = isEn
        ? "When you personalize this jewel, it will start whispering messages tuned to one person, one intention, one story."
        : "Lorsque vous personnaliserez ce bijou, il commencera à murmurer des messages ajustés à une personne, une intention, une histoire.";

      contentEl.innerHTML = `
        <div class="bloc">
          <div class="bloc-title">
            ${isEn ? "About this jewel" : "À propos de ce bijou"}
          </div>
          <p>${preText}</p>
          <p>
            ${isEn ? "Current theme:" : "Thème actuel :"} <strong>${themeText}</strong>
          </p>
        </div>

        <div class="actions">
          <a href="${urlPersonnalisation}" class="btn btn-main">
            ${isEn ? "✨ Personalize this whisper" : "✨ Personnaliser ce murmure"}
          </a>
          <a href="${indexPage}" class="btn btn-ghost">
            ${isEn ? "Back to the Atelier website" : "Revenir au site de l’Atelier"}
          </a>
        </div>
      `;

      infoEl.textContent = isEn
        ? "You can personalize this jewel yourself, or ask the artisan to do it for you."
        : "Vous pouvez personnaliser ce bijou vous-même, ou demander à l’artisan de le faire pour vous.";
    }

    function renderActiveActions(bijou, isEn) {
      const id = bijou.id;
      const bijouPage = isEn ? "/bijou-en.html" : "/bijou.html";
      const persoPage = isEn ? "/personnalisation-en.html" : "/personnalisation.html";

      const urlMurmure = `${bijouPage}?id=${encodeURIComponent(id)}`;
      const urlPerso = `${persoPage}?id=${encodeURIComponent(id)}`;

      const themeText = bijou.theme || (isEn ? "not defined" : "non défini");
      const sousThemeText = bijou.sous_theme || (isEn ? "not specified" : "non précisé");

      contentEl.innerHTML = `
        <div class="bloc">
          <div class="bloc-title">
            ${isEn ? "Linked intention" : "Intention liée à ce bijou"}
          </div>
          <p>
            ${isEn ? "Theme:" : "Thème :"} <strong>${themeText}</strong><br/>
            ${isEn ? "Sub-theme:" : "Sous-thème :"} <strong>${sousThemeText}</strong>
          </p>
        </div>

        <div class="actions">
          <a href="${urlMurmure}" class="btn btn-main">
            ${isEn ? "🎧 Listen to the whisper" : "🎧 Écouter le murmure"}
          </a>
          <a href="${urlPerso}" class="btn btn-ghost">
            ${isEn ? "Adjust personalization" : "Ajuster la personnalisation"}
          </a>
        </div>
      `;

      infoEl.textContent = isEn
        ? "Each time you tap the jewel with a compatible phone, a new whisper can be generated."
        : "À chaque contact du bijou avec un téléphone compatible, un nouveau murmure peut être généré.";
    }

    main();
  </script>
  <script src="/lang-switch.js"></script>
</body>
</html>
