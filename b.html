<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Votre bijou – L’Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg-card: rgba(255,250,243,0.98);
      --accent: #b8833a;
      --accent-soft: #eadcc8;
      --text-main: #2e241b;
      --text-soft: #5a4335;
      --border-soft: rgba(170, 140, 90, 0.55);
      --shadow-soft: 0 16px 40px rgba(0,0,0,0.32);
      --radius-xl: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Helvetica Neue", Arial, sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 12px;
      position: relative;
      overflow-x: hidden;
    }

    /* Fond forêt */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("foret-atelier.jpg") center center / cover no-repeat fixed;
      filter: blur(3px) brightness(0.7);
      transform: scale(1.03);
      z-index: -2;
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(246, 236, 220, 0.6);
      z-index: -1;
    }

    .card {
      max-width: 960px;
      width: 100%;
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border-soft);
      padding: 20px 18px 22px;
      backdrop-filter: blur(10px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 1.05rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--accent);
      margin: 0 0 4px;
    }

    .sub {
      font-size: 0.9rem;
      color: var(--text-soft);
      margin-bottom: 10px;
    }

    .badge-code {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 12px;
      background: #f5ebdd;
      border: 1px solid var(--border-soft);
      font-size: 0.82rem;
      margin-bottom: 10px;
    }
    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #82a738;
    }

    .status {
      font-size: 0.9rem;
      color: var(--text-soft);
      margin-bottom: 12px;
    }
    .status.error {
      color: #b03a3a;
    }
    .status.ok {
      color: #356b2d;
    }

    .murmure-box {
      width: 100%;
      border-radius: 16px;
      border: 1px solid #ddcbb3;
      background: #fffdf8;
      padding: 14px 14px 10px;
      min-height: 120px;
      font-family: "Courier New", ui-monospace, SFMono-Regular, Menlo, Monaco,
        Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 1rem;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-wrap: break-word;
    }

    audio {
      width: 100%;
      margin-top: 14px;
    }

    .info {
      margin-top: 10px;
      font-size: 0.8rem;
      color: var(--text-soft);
    }

    /* Switch FR / EN local à la page */
    .lang-switch {
      display: inline-flex;
      background: #f7ecdd;
      border-radius: 999px;
      padding: 3px;
      border: 1px solid rgba(170, 140, 90, 0.45);
      gap: 3px;
      align-items: center;
      font-size: 0.78rem;
    }
    .lang-btn {
      border-radius: 999px;
      border: none;
      padding: 4px 10px;
      font-size: 0.78rem;
      cursor: pointer;
      background: transparent;
      color: #5a4335;
    }
    .lang-btn.active {
      background: #b8833a;
      color: #fff;
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .card-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div>
        <h1>L’ATELIER DES LIENS INVISIBLES</h1>
        <div class="sub" id="subtitle">
          Connexion au bijou en cours…
        </div>
      </div>

      <div class="lang-switch">
        <button class="lang-btn" data-lang="fr" id="btn-fr">FR</button>
        <button class="lang-btn" data-lang="en" id="btn-en">EN</button>
      </div>
    </div>

    <div id="codeZone" class="badge-code" style="display:none;">
      <div class="badge-dot"></div>
      <span id="codeLabel"></span>
    </div>

    <div id="status" class="status">
      Lecture du murmure en préparation…
    </div>

    <div id="murmure" class="murmure-box">
      <!-- texte du murmure -->
    </div>

    <audio id="audioPlayer" controls style="display:none;"></audio>

    <div class="info" id="info">
      Ce murmure est unique, généré à partir des paramètres choisis lors de la création du bijou.
      Si quelque chose vous semble anormal, contactez l’atelier.
    </div>
  </div>

  <script>
    // --- Langue (FR / EN) ---

    function getInitialLang() {
      const fromStorage = window.localStorage.getItem("atelier_lang");
      if (fromStorage === "fr" || fromStorage === "en") return fromStorage;

      const nav = (navigator.language || "fr").toLowerCase();
      if (nav.startsWith("en")) return "en";
      return "fr";
    }

    let currentLang = getInitialLang();

    const btnFr = document.getElementById("btn-fr");
    const btnEn = document.getElementById("btn-en");

    function updateLangButtons() {
      btnFr.classList.toggle("active", currentLang === "fr");
      btnEn.classList.toggle("active", currentLang === "en");
    }
// --- Animation "machine à écrire" ---
let currentTypingId = 0;

function typewriter(el, text, speed = 25) {
  currentTypingId++;
  const myId = currentTypingId;
  el.textContent = "";
  let i = 0;

  function step() {
    // si une nouvelle animation a commencé entre-temps, on arrête celle-ci
    if (myId !== currentTypingId) return;

    el.textContent = text.slice(0, i);
    if (i < text.length) {
      i++;
      setTimeout(step, speed);
    }
  }

  step();
}

    btnFr.addEventListener("click", () => {
      if (currentLang !== "fr") {
        currentLang = "fr";
        window.localStorage.setItem("atelier_lang", "fr");
        updateLangButtons();
        loadWhisper(); // recharge le murmure dans cette langue
      }
    });
    btnEn.addEventListener("click", () => {
      if (currentLang !== "en") {
        currentLang = "en";
        window.localStorage.setItem("atelier_lang", "en");
        updateLangButtons();
        loadWhisper();
      }
    });

    updateLangButtons();

    // --- Récup du code bijou dans l’URL ---

    function getPublicIdFromUrl() {
      const url = new URL(window.location.href);

      const fromQuery =
        url.searchParams.get("public_id") ||
        url.searchParams.get("code") ||
        url.searchParams.get("c");
      if (fromQuery) return fromQuery;

      const parts = window.location.pathname.split("/").filter(Boolean);
      if (parts.length >= 2 && parts[0] === "b") {
        return parts[1];
      }
      return null;
    }

    const subtitle = document.getElementById("subtitle");
    const statusEl = document.getElementById("status");
    const murmureEl = document.getElementById("murmure");
    const infoEl = document.getElementById("info");
    const codeZone = document.getElementById("codeZone");
    const codeLabel = document.getElementById("codeLabel");
    const audioPlayer = document.getElementById("audioPlayer");

    async function loadWhisper() {
      const publicId = getPublicIdFromUrl();

      if (!publicId) {
        subtitle.textContent = currentLang === "en"
          ? "Jewel not found."
          : "Bijou introuvable.";
        statusEl.className = "status error";
        statusEl.textContent = currentLang === "en"
          ? "No jewel code was detected in this link."
          : "Aucun code de bijou n’a été détecté dans ce lien.";
        murmureEl.textContent = "";
        audioPlayer.style.display = "none";
        return;
      }

      codeZone.style.display = "inline-flex";
      codeLabel.textContent =
        (currentLang === "en" ? "Jewel code: " : "Code bijou : ") + publicId;

      subtitle.textContent = currentLang === "en"
        ? "Connecting to the jewel…"
        : "Connexion au bijou en cours…";

      statusEl.className = "status";
      statusEl.textContent = currentLang === "en"
        ? "Preparing the whisper…"
        : "Préparation du murmure…";

      murmureEl.textContent = "";
      audioPlayer.style.display = "none";
      audioPlayer.removeAttribute("src");

      try {
        const resp = await fetch(
          `/api/publicMessage?public_id=${encodeURIComponent(publicId)}&lang=${encodeURIComponent(currentLang)}`
        );

        if (!resp.ok) {
          throw new Error("HTTP " + resp.status);
        }

        const data = await resp.json();

        if (!data || data.ok === false || data.error) {
          statusEl.className = "status error";
          statusEl.textContent = currentLang === "en"
            ? "An error occurred. Please try again later."
            : "Une erreur est survenue. Merci de réessayer plus tard.";
          murmureEl.textContent = data && data.text
            ? data.text
            : (currentLang === "en"
               ? "I am here, silent, but present for you. (Internal error.)"
               : "Je suis là, silencieux, mais présent pour toi. (Erreur interne.)");
          return;
        }

        // OK
        statusEl.className = "status ok";
        statusEl.textContent = currentLang === "en"
          ? "Whisper generated."
          : "Murmure généré.";

        murmureEl.textContent = data.text || "";

        if (data.audio) {
          audioPlayer.src = data.audio;
          audioPlayer.style.display = "block";
        } else {
          audioPlayer.style.display = "none";
        }

        infoEl.textContent = currentLang === "en"
          ? "This whisper is unique, generated from the parameters chosen when the jewel was created. If something feels wrong, please contact the Atelier."
          : "Ce murmure est unique, généré à partir des paramètres choisis lors de la création du bijou. Si quelque chose vous semble anormal, contactez l’atelier.";
      } catch (err) {
        console.error("Erreur /api/publicMessage:", err);
        statusEl.className = "status error";
        statusEl.textContent = currentLang === "en"
          ? "An error occurred. Please try again later."
          : "Une erreur est survenue. Merci de réessayer plus tard.";
        const errText = currentLang === "en"
  ? "I am here, silent, but present for you. (Internal error.)"
  : "Je suis là, silencieux, mais présent pour toi. (Erreur interne.)";
typewriter(murmureEl, errText);

        audioPlayer.style.display = "none";
      }
    }

    loadWhisper();
  </script>
</body>
</html>
