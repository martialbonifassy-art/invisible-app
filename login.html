<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Connexion artisan – Atelier des Liens Invisibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, sans-serif;
      background: #f7efe2;
      color: #3b2f24;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fffaf3;
      padding: 24px 22px 26px;
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
      max-width: 360px;
      width: 100%;
      border: 1px solid rgba(184,131,58,0.4);
    }
    h1 {
      font-size: 1rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #b8833a;
      margin: 0 0 10px;
      text-align: center;
    }
    p {
      font-size: 0.9rem;
      margin: 0 0 18px;
      text-align: center;
      color: #6b4f3f;
    }
    label {
      display: block;
      font-size: 0.8rem;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #856549;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      border-radius: 999px;
      border: 1px solid rgba(133,101,73,0.5);
      padding: 8px 12px;
      font-size: 0.9rem;
      margin-bottom: 12px;
      background: #fffdf8;
    }
    button {
      width: 100%;
      padding: 10px 16px;
      border-radius: 999px;
      border: none;
      background: #b8833a;
      color: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 4px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.18);
    }
    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }
    .msg {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #8a735a;
      text-align: center;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ACCÈS ARTISAN</h1>
    <p>Connexion à l’espace de gestion des bijoux.</p>

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="martialbonifass@gmail.com" />

    <label for="password">Mot de passe</label>
    <input id="password" type="password" placeholder="••••••••" />

    <button id="btnLogin">Se connecter</button>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    const emailInput = document.getElementById("email");
    const passInput = document.getElementById("password");
    const btnLogin = document.getElementById("btnLogin");
    const msg = document.getElementById("msg");

    async function tryLogin() {
      msg.textContent = "";
      btnLogin.disabled = true;

      const email = emailInput.value.trim();
      const password = passInput.value.trim();

      if (!email || !password) {
        msg.textContent = "Merci de remplir email et mot de passe.";
        btnLogin.disabled = false;
        return;
      }

      try {
        const resp = await fetch("/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const data = await resp.json().catch(() => ({}));

        if (!resp.ok || !data.ok) {
          msg.textContent =
            data && data.error
              ? "Connexion impossible : " + data.error
              : "Connexion impossible. Merci de vérifier vos identifiants.";
          btnLogin.disabled = false;
          return;
        }

        msg.textContent = "Connexion réussie, redirection en cours…";
        window.location.href = "/dashboard.html";
      } catch (e) {
        console.error(e);
        msg.textContent =
          "Erreur de connexion au serveur. Merci de réessayer plus tard.";
        btnLogin.disabled = false;
      }
    }

    btnLogin.addEventListener("click", tryLogin);

    // Validation avec Entrée
    passInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        tryLogin();
      }
    });
    emailInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        tryLogin();
      }
    });
  </script>
</body>
</html>
